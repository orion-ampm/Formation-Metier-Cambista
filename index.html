td>Bonne — Europe</td><td>Patrimoniaux</td></tr>\n<tr><td class=\"c-amber\"><strong>Krugerrand 1oz</strong></td><td>31,10g (999‰)</td><td>2–5%</td><td>Mondiale</td><td>Investisseur, faible prime</td></tr>\n<tr><td class=\"c-amber\"><strong>Maple Leaf 1oz</strong></td><td>31,10g (999,9‰)</td><td>3–6%</td><td>Mondiale</td><td>Investisseur, pureté maximale</td></tr>\n<tr><td class=\"c-amber\"><strong>Britannia 1oz</strong></td><td>31,10g (999,9‰)</td><td>3–6%</td><td>Bonne — Europe</td><td>Diversification internationale</td></tr>\n</tbody></table>\n\n<div class=\"section-title\" style=\"margin-top:18px\">2. Or d'investissement moderne (lingots et lingotins)</div>\n<table class=\"tbl\"><thead><tr><th>Format</th><th>Valeur approx. (85€/g)</th><th>Prime / g</th><th>Certificat LBMA</th><th>Usage recommandé</th></tr></thead><tbody>\n<tr><td><strong>Lingotin 1g</strong></td><td>~85 €</td><td>Très élevée (15–30%)</td><td>Non</td><td>Cadeau, initiation enfant</td></tr>\n<tr><td><strong>Lingotin 5g</strong></td><td>~425 €</td><td>Élevée (8–15%)</td><td>Selon fab.</td><td>Épargne régulière, cadeau</td></tr>\n<tr><td><strong>Lingotin 10g</strong></td><td>~850 €</td><td>Moyenne (5–10%)</td><td>Selon fab.</td><td>Bon compromis prime/poids</td></tr>\n<tr><td><strong>Lingotin 20g</strong></td><td>~1 700 €</td><td>Modérée (4–8%)</td><td>Oui (LBMA)</td><td>Investissement patrimonial</td></tr>\n<tr><td><strong>Lingotin 50g</strong></td><td>~4 250 €</td><td>Faible (3–6%)</td><td>Oui (LBMA)</td><td>Stock stratégique</td></tr>\n<tr><td><strong>Lingotin 100g</strong></td><td>~8 500 €</td><td>Très faible (2–5%)</td><td>Oui (LBMA)</td><td>Investisseur confirmé</td></tr>\n<tr><td><strong>Lingot 250g</strong></td><td>~21 250 €</td><td>Minimale (2–4%)</td><td>Oui (LBMA)</td><td>Grandes positions</td></tr>\n<tr><td><strong>Lingot 1 kg (Good Delivery)</strong></td><td>~85 000 €</td><td>Quasi nulle (&lt;2%)</td><td>Oui LBMA GD</td><td>Institutionnel, gros patrimoine</td></tr>\n</tbody></table>\n<div class=\"info-box\"><strong>Lingot neuf vs lingot français :</strong> Le lingot <em>neuf</em> (LBMA, en carte blister) a une prime légèrement supérieure car il est certifié, tracé et immédiatement acceptable partout. Le <em>lingot français</em> (ancienne fonte, sans blister) a une prime inférieure mais reste très liquide sur le marché professionnel. À l'achat client, toujours exiger le certificat d'assay.</div>\n\n<div class=\"section-title\" style=\"margin-top:18px\">3. Pièces hors cote</div>\n<div class=\"card\">\n<div class=\"step-detail\" style=\"line-height:1.8;margin-bottom:8px\">Les pièces <strong>hors cote</strong> sont des pièces numismatiques ou historiques dont la valeur dépasse la simple valeur métal. Leur prime est souvent élevée et liée à la rareté, l'état de conservation et la demande collectionneurs.</div>\n<div class=\"step-row\"><div class=\"step-num\" style=\"background:#C8A84B;color:#1B2A4A\">!</div><div class=\"step-body\"><div class=\"step-label\">Exemples typiques en boutique</div><div class=\"step-detail\">Pièces frappées avant 1800 · Millésimes rares (ex : Napoléon 1808 1er type) · Pièces en état fleur de coin (FDC) · Séries limitées · Monnaies de la Monnaie de Paris</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\" style=\"background:#C8A84B;color:#1B2A4A\">!</div><div class=\"step-body\"><div class=\"step-label\">Fiscalité différente</div><div class=\"step-detail\">Les pièces hors cote (valeur &gt; 250% du cours métal) relèvent du régime des plus-values mobilières classique — pas du régime TMP/TPV métaux précieux. Vérifier systématiquement avant toute vente.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\" style=\"background:#C8A84B;color:#1B2A4A\">!</div><div class=\"step-body\"><div class=\"step-label\">Marge potentielle</div><div class=\"step-detail\">La marge sur les pièces hors cote peut être très supérieure à la marge sur l'or de bourse — mais elles nécessitent une expertise numismatique et un marché acheteur identifié. Ne pas surcharger le stock sans débouché identifié.</div></div></div>\n</div>"},{"t":"L'argent investissement — Spécificités et primes","html":"<div class=\"section-title\">Produits argent en stock</div>\n<table class=\"tbl\"><thead><tr><th>Produit</th><th>Poids</th><th>Prime typique</th><th>TVA</th><th>Liquidité</th></tr></thead><tbody>\n<tr><td><strong>Philharmonique 1oz (argent)</strong></td><td>31,10g (999‰)</td><td>10–20%</td><td>20% (achat)</td><td>Bonne — Europe</td></tr>\n<tr><td><strong>Maple Leaf argent 1oz</strong></td><td>31,10g (999,9‰)</td><td>10–20%</td><td>20%</td><td>Bonne — mondiale</td></tr>\n<tr><td><strong>American Eagle argent 1oz</strong></td><td>31,10g (999‰)</td><td>12–22%</td><td>20%</td><td>Bonne — mondiale</td></tr>\n<tr><td><strong>Britannia argent 1oz</strong></td><td>31,10g (999,9‰)</td><td>10–18%</td><td>20%</td><td>Bonne — Europe</td></tr>\n<tr><td><strong>Lingotin argent 100g</strong></td><td>100g (999‰)</td><td>8–15%</td><td>20%</td><td>Moyenne</td></tr>\n<tr><td><strong>Lingotin argent 1 kg</strong></td><td>1 000g (999‰)</td><td>4–10%</td><td>20%</td><td>Bonne — pro</td></tr>\n</tbody></table>\n\n<div class=\"section-title\" style=\"margin-top:18px\">Pourquoi l'argent a plus de volatilité que l'or ?</div>\n<div class=\"card\">\n<div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Marché beaucoup plus petit</div><div class=\"step-detail\">Le marché mondial de l'argent est environ 10 à 15 fois plus petit que celui de l'or. Un même volume d'achats ou de ventes a donc un impact sur le cours beaucoup plus important.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Double nature : métal précieux ET industriel</div><div class=\"step-detail\">L'argent est utilisé dans les panneaux solaires, l'électronique, la médecine (antibactérien) et les batteries. Sa demande industrielle (60% de la consommation mondiale) le rend sensible aux cycles économiques — ce que l'or n'est pas.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Ratio or/argent historique</div><div class=\"step-detail\">Historiquement, le ratio or/argent tourne autour de 1:15 à 1:20 (15-20 oz d'argent pour 1 oz d'or). Aujourd'hui ce ratio dépasse 1:80 — l'argent est donc statistiquement sous-évalué par rapport à l'or.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Moins de liquidité en boutique</div><div class=\"step-detail\">Le marché secondaire de l'argent en boutique est moins profond que celui de l'or. Il est plus difficile de revendre rapidement de grandes quantités d'argent sans impacter le prix.</div></div></div>\n</div>\n\n<div class=\"section-title\" style=\"margin-top:18px\">Pourquoi les primes sur l'argent sont-elles plus élevées ?</div>\n<div class=\"card\">\n<div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">TVA de 20% à l'achat</div><div class=\"step-detail\">Contrairement à l'or d'investissement (exonéré de TVA), l'argent est soumis à TVA 20% à l'achat. Cette TVA est intégrée dans le prix de vente au client — elle gonfle mécaniquement la prime perçue.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Coût de fabrication rapporté au prix</div><div class=\"step-detail\">Frapper ou couler une pièce ou un lingotin coûte environ le même prix quelle que soit la valeur du métal. Pour l'argent (valeur ~0,85 €/g), ce coût fixe représente un % beaucoup plus élevé du prix total que pour l'or (85 €/g).</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Logistique plus complexe</div><div class=\"step-detail\">L'argent est lourd pour sa valeur — 1 kg d'argent vaut ~850 €, contre ~85 000 € pour 1 kg d'or. Transport, stockage et manutention coûtent proportionnellement beaucoup plus cher.</div></div></div>\n</div>\n<div class=\"alert-box\">Conseil stock argent : ne pas surcharger. L'argent immobilise du capital et de l'espace pour une valeur relativement faible. Maintenir un stock raisonnable de pièces 1oz (les plus demandées) et éviter les grands lingots à moins d'avoir un acheteur identifié.</div>"},{"t":"La notion de prime — Comprendre et expliquer","html":"<div class=\"section-title\">Définition et calcul</div>\n<div class=\"card\" style=\"background:#fffbf0;border:1.5px solid #C8A84B\">\n<div style=\"font-size:14px;font-weight:700;color:#5a4010;margin-bottom:8px\">Formule de la prime</div>\n<div style=\"font-size:14px;color:#333;margin-bottom:8px\"><strong>Prime (%) = [(Prix de marché − Valeur métal pure) ÷ Valeur métal pure] × 100</strong></div>\n<div style=\"font-size:12px;color:#555\">Exemple : Napoléon — Cours or 85 €/g · Valeur métal = 5,806 × 85 = 493 € · Prix de marché = 570 € · Prime = (570−493)/493 × 100 = <strong>15,6%</strong></div>\n</div>\n\n<div class=\"section-title\" style=\"margin-top:16px\">Ce qui fait monter ou baisser la prime</div>\n<table class=\"tbl\"><thead><tr><th>Facteur</th><th>Effet sur la prime</th><th>Exemple concret</th></tr></thead><tbody>\n<tr><td><strong>Demande forte</strong></td><td class=\"c-red\">Prime monte</td><td>Crise financière, tensions géopolitiques → Napoléons +30%</td></tr>\n<tr><td><strong>Offre abondante</strong></td><td class=\"c-green\">Prime baisse</td><td>Beaucoup de vendeurs → prime comprimée</td></tr>\n<tr><td><strong>Reconnaissance du produit</strong></td><td class=\"c-red\">Prime haute</td><td>Napoléon reconnu partout en France — prime justifiée</td></tr>\n<tr><td><strong>Format petit</strong></td><td class=\"c-red\">Prime très haute</td><td>Lingotin 1g : prime 25-30% · Lingot 1kg : prime &lt;2%</td></tr>\n<tr><td><strong>TVA (argent)</strong></td><td class=\"c-red\">Prime intégrée</td><td>TVA 20% sur l'argent gonfle mécaniquement la prime</td></tr>\n<tr><td><strong>Avantage fiscal (or)</strong></td><td class=\"c-red\">Prime justifiée</td><td>Exonération TVA + abattements TPV = la prime est rentable</td></tr>\n</tbody></table>\n\n<div class=\"section-title\" style=\"margin-top:16px\">L'argument commercial clé sur la prime</div>\n<div class=\"card\" style=\"background:#EAF3DE;border-left:4px solid #639922\">\n<div style=\"font-size:13px;font-weight:700;color:#2D5A0E;margin-bottom:8px\">Ce qu'il faut dire au client</div>\n<div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922\">1</div><div class=\"step-body\"><div class=\"step-detail\" style=\"color:#2D5A0E\"><strong>La prime se récupère à la revente.</strong> Vous payez 15% de prime aujourd'hui — mais le prochain acheteur paiera aussi 15% de prime sur le même produit. L'or est le seul actif qui vous rembourse sa prime à la sortie.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922\">2</div><div class=\"step-body\"><div class=\"step-detail\" style=\"color:#2D5A0E\"><strong>La prime reflète une valeur réelle :</strong> liquidité garantie, avantage fiscal, reconnaissance internationale. Un lingot 1kg a moins de prime — mais il est infiniment moins liquide.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922\">3</div><div class=\"step-body\"><div class=\"step-detail\" style=\"color:#2D5A0E\"><strong>Sur le long terme, la prime est marginale.</strong> Entre 2000 et 2026, l'or a été multiplié par 10 en euros. La prime initiale de 15% est devenue négligeable face à cette performance.</div></div></div>\n</div>"},{"t":"Histoire du cours de l'or","html":"<div class=\"section-title\">Grandes étapes — Chronologie</div>\n<table class=\"tbl\"><thead><tr><th>Période</th><th>Cours (€ ou $/oz)</th><th>Événement déclencheur</th></tr></thead><tbody>\n<tr><td>Avant 1971</td><td>35 $/oz (fixe)</td><td>Système de Bretton Woods — dollar indexé sur l'or</td></tr>\n<tr><td>1971</td><td>Libération</td><td>Nixon supprime la convertibilité dollar/or — fin du gold standard</td></tr>\n<tr><td>Janvier 1980</td><td>850 $/oz (pic)</td><td>Guerre froide, crise iranienne, inflation — sommet historique de l'époque</td></tr>\n<tr><td>1980–2001</td><td>250–450 $/oz</td><td>20 ans de baisse — taux élevés, dollar fort, ventes banques centrales</td></tr>\n<tr><td>2001</td><td>~250 $/oz</td><td>Creux historique moderne — banques centrales vendent leurs réserves</td></tr>\n<tr><td>2008</td><td>1 000 $/oz</td><td>Crise des subprimes — premier passage symbolique des 1 000 $</td></tr>\n<tr><td>Septembre 2011</td><td>1 920 $/oz (pic)</td><td>Crise de la dette souveraine européenne, QE américain</td></tr>\n<tr><td>2011–2015</td><td>1 100–1 300 $/oz</td><td>Correction — reprise économique, hausse des taux</td></tr>\n<tr><td>2020 (Covid)</td><td>2 075 $/oz (record)</td><td>Pandémie, QE massif, taux zéro — record absolu en août 2020</td></tr>\n<tr><td>2022–2024</td><td>1 800–2 100 $/oz</td><td>Guerre en Ukraine, inflation mondiale, tensions géopolitiques</td></tr>\n<tr><td>2024–2025</td><td>2 500–3 000 $/oz</td><td>Achats massifs des banques centrales (Chine, Inde), dé-dollarisation</td></tr>\n</tbody></table>\n\n<div class=\"section-title\" style=\"margin-top:16px\">Ce que ça signifie pour le conseil client</div>\n<div class=\"card\">\n<div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">L'or monte en période d'incertitude</div><div class=\"step-detail\">Chaque grande crise (1980, 2008, 2020, 2024) a déclenché une hausse significative. L'or est une assurance systémique — il performe exactement quand le reste du portefeuille souffre.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Les banques centrales achètent — signal fort</div><div class=\"step-detail\">Depuis 2022, les banques centrales mondiales (Chine, Inde, Turquie, Pologne) achètent de l'or à un rythme record. Ce que font les banques centrales est le signal le plus fiable sur le long terme.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Depuis 2001 : x12 en 25 ans</div><div class=\"step-detail\">Un client ayant acheté 10 000 € d'or en 2001 possède aujourd'hui ~120 000 €. C'est la performance la plus régulière de tous les actifs tangibles sur cette période, hors immobilier dans certaines villes.</div></div></div>\n</div>\n<div class=\"info-box\"><strong>Argument puissant en boutique :</strong> « L'or n'a pas de rendement, mais depuis 2001 il a multiplié sa valeur par 12 en euros. Aucune obligation d'État, aucun livret n'a fait ça. Et lui ne peut pas faire faillite. »</div>"},{"t":"Gestion du stock — Optimisation des marges","html":"<div class=\"section-title\">Règles de base de la gestion de stock MP</div>\n<div class=\"card\">\n<div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Stock stratégique vs stock spéculatif</div><div class=\"step-detail\"><strong>Stock stratégique :</strong> ce dont les clients ont besoin régulièrement — Napoléons, lingotins 10-50g, quelques pièces 1oz. À maintenir en permanence.<br><strong>Stock spéculatif :</strong> achats opportunistes quand le cours est bas, dans l'espoir de revendre plus haut. Risque élevé — réservé à la Direction.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Rotation est clé</div><div class=\"step-detail\">Un article qui dort en vitrine immobilise du capital. Objectif : rotation maximale sur les produits à forte marge (Napoléons, petits lingotins), et réapprovisionnement rapide après chaque vente.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Acheter pour revendre, pas pour stocker</div><div class=\"step-detail\">La marge se fait à l'achat (rachat de fonte, lingots au bon prix) ET à la vente (prime sur les produits finis). Ne jamais stocker ce qu'on ne peut pas vendre dans les 30 jours.</div></div></div>\n</div>\n\n<div class=\"section-title\" style=\"margin-top:16px\">Matrice de marge par catégorie de produit</div>\n<table class=\"tbl\"><thead><tr><th>Catégorie</th><th>Marge brute typique</th><th>Vitesse de rotation</th><th>Recommandation stock</th></tr></thead><tbody>\n<tr><td class=\"c-green\"><strong>Napoléons 20 Fr</strong></td><td>8–15%</td><td>Très rapide</td><td>Stock permanent — 20 à 50 pièces</td></tr>\n<tr><td class=\"c-green\"><strong>Lingotins 10-20g</strong></td><td>5–10%</td><td>Rapide</td><td>Stock permanent — 5 à 10 unités</td></tr>\n<tr><td class=\"c-amber\"><strong>Krugerrand / Maple 1oz</strong></td><td>3–6%</td><td>Bonne</td><td>Stock régulier — 5 à 10 pièces</td></tr>\n<tr><td class=\"c-amber\"><strong>Lingotins 50-100g</strong></td><td>3–5%</td><td>Moyenne</td><td>Sur commande ou 2-3 unités</td></tr>\n<tr><td class=\"c-amber\"><strong>Pièces hors cote</strong></td><td>15–40%</td><td>Lente</td><td>Uniquement si acheteur identifié</td></tr>\n<tr><td class=\"c-red\"><strong>Lingots 250g+</strong></td><td>1–3%</td><td>Très lente</td><td>Sur commande uniquement</td></tr>\n<tr><td class=\"c-red\"><strong>Argent (pièces/lingots)</strong></td><td>5–12%</td><td>Lente</td><td>Stock limité — quelques pièces 1oz</td></tr>\n</tbody></table>\n\n<div class=\"section-title\" style=\"margin-top:16px\">Optimiser les marges : les 4 leviers</div>\n<div class=\"card\">\n<div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Acheter juste — le rachat de fonte</div><div class=\"step-detail\">Le rachat de fonte au client est la source de métal la moins chère. Un lingot racheté à -15% du cours spot, refondu et certifié, peut être revendu avec une prime de +10 à +20%. La marge brute sur la chaîne complète peut dépasser 25%.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Vendre au bon format</div><div class=\"step-detail\">Un kilo d'or vendu en lingots de 10g génère beaucoup plus de marge qu'un lingot 1kg. Mais ça demande plus de temps et de stock. Trouver le bon équilibre selon le profil de la clientèle locale.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Vendre au bon moment</div><div class=\"step-detail\">Quand le cours monte, les clients veulent vendre — c'est le moment de racheter de la fonte. Quand le cours baisse, les clients hésitent à acheter — proposer des arguments de long terme et des petits formats accessibles.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Fidéliser les clients à haut potentiel</div><div class=\"step-detail\">Un client avec un compte poids génère des revenus récurrents (gardiennage) et revient régulièrement. Le contact proactif (appel quand le cours bouge) crée de la loyauté et des transactions répétées.</div></div></div>\n</div>"},{"t":"Adapter le produit au profil client — Discours de vente","html":"<div class=\"section-title\">Grille de recommandation produit selon le profil</div>\n<table class=\"tbl\"><thead><tr><th>Profil client</th><th>Budget</th><th>Produit recommandé</th><th>Argument clé</th></tr></thead><tbody>\n<tr><td><strong>Primo-investisseur curieux</strong></td><td>&lt; 500 €</td><td>2–3 Napoléons ou lingotin 5g</td><td>Accessibilité, liquidité, cadeau potentiel pour la famille</td></tr>\n<tr><td><strong>Épargnant régulier</strong></td><td>500–3 000 €</td><td>Napoléons + lingotin 10-20g</td><td>Mix liquidité/faible prime, diversification accessible</td></tr>\n<tr><td><strong>Investisseur patrimonial</strong></td><td>3 000–20 000 €</td><td>Lingotins 50-100g LBMA + Napoléons</td><td>Prime faible sur les lingotins, Napoléons pour la liquidité immédiate</td></tr>\n<tr><td><strong>Gros investisseur</strong></td><td>&gt; 20 000 €</td><td>Lingots 250g-1kg + compte poids</td><td>Prime minimale, compte poids évite la logistique</td></tr>\n<tr><td><strong>Cadeau / naissance</strong></td><td>100–300 €</td><td>Lingotin 1-5g coffret ou Napoléon</td><td>Aspect esthétique, valeur symbolique, format compact</td></tr>\n<tr><td><strong>Clientèle transfrontalière ESP/AND</strong></td><td>Variable</td><td>Krugerrand, Maple Leaf, Vreneli</td><td>Reconnaissance internationale, facile à revendre partout</td></tr>\n<tr><td><strong>Client avec du stock à vendre</strong></td><td>—</td><td>Proposer le rachat d'abord</td><td>Transformer un vendeur en acheteur si le cours est haut</td></tr>\n</tbody></table>\n\n<div class=\"section-title\" style=\"margin-top:18px\">Comment conduire un bon entretien de vente</div>\n<div class=\"card\">\n<div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Découverte — poser les bonnes questions</div><div class=\"step-detail\">« C'est pour vous ou pour offrir ? » · « Vous cherchez plutôt à protéger votre patrimoine ou à faire une plus-value ? » · « Vous avez déjà de l'or ou c'est un premier achat ? » · « Vous avez un horizon de détention en tête ? »</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Éduquer brièvement — sans submerger</div><div class=\"step-detail\">Expliquer en 30 secondes la différence or d'investissement / bijou. Expliquer la prime en 1 phrase : « Vous payez une prime pour la liquidité — et vous la récupérez à la revente. » Ne jamais noyer le client dans les détails techniques d'emblée.</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Recommander — être direct et confiant</div><div class=\"step-detail\">« Dans votre situation, je vous recommande les Napoléons. Voilà pourquoi : ils sont reconnus partout en France, la prime est raisonnable et vous pouvez revendre demain si vous en avez besoin. »</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Gérer l'objection prix</div><div class=\"step-detail\">Si le client trouve le cours trop élevé : « Le cours a multiplié par 12 depuis 2001. Ce n'est pas le cours qui est élevé — c'est l'euro qui a perdu de la valeur. » Si la prime le bloque : « Cette prime, vous la récupérez à la revente. »</div></div></div>\n<div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Clore — proposer un plan</div><div class=\"step-detail\">Pour les clients indécis : « Commencez par 2 Napoléons pour voir. Si ça vous convient, on peut mettre en place un achat régulier mensuel. » L'objectif est de créer une relation, pas de faire une vente unique.</div></div></div>\n</div>\n\n<div class=\"section-title\" style=\"margin-top:16px\">Considérer le stock disponible dans la recommandation</div>\n<div class=\"card\" style=\"background:#EAF3DE;border-left:4px solid #639922\">\n<div class=\"step-detail\" style=\"color:#2D5A0E;line-height:1.8;margin-bottom:8px\"><strong>Vendre ce qu'on a en stock</strong> est toujours plus profitable que commander pour un client hésitant. Si vous avez 20 Napoléons en stock et seulement 2 lingotins 10g, orientez naturellement le client vers les Napoléons — sans jamais sacrifier la pertinence de la recommandation.</div>\n<div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922\">!</div><div class=\"step-body\"><div class=\"step-detail\" style=\"color:#2D5A0E\">Si un client demande un produit absent du stock : proposer une alternative de valeur équivalente en boutique, puis commander le produit souhaité pour sa prochaine visite. Ne jamais perdre une vente pour une question de stock.</div></div></div>\n</div>"}],"quiz":[{"q":"Quel produit a la prime la plus faible sur le marché ?","o":["Napoléon 20 Fr","Lingotin 1g","Lingot 1kg Good Delivery (LBMA)","Pièce hors cote"],"a":2},{"q":"La TVA sur les pièces d'argent investissement est de :","o":["Exonérée comme l'or","20%","10%","6,5%"],"a":1},{"q":"Pourquoi l'argent est-il plus volatil que l'or ?","o":["Car il est moins rare","Car son marché est plus petit ET il a une forte demande industrielle","Car les banques centrales n'en achètent pas","Car sa prime est plus élevée"],"a":1},{"q":"Un client a 500 € à investir pour la première fois. Vous recommandez :","o":["Un lingot 1kg (faible prime)","2-3 Napoléons ou un lingotin 5g","De l'argent physique pour la volatilité","Un compte poids"],"a":1},{"q":"Qu'est-ce qu'une pièce hors cote ?","o":["Une pièce rare dont la valeur dépasse 250% du cours métal","Une pièce étrangère non reconnue en France","Une pièce dont la TVA est exonérée","Une pièce usée sans valeur numismatique"],"a":0},{"q":"La formule de la prime est :","o":["(Prix métal - Prix marché) / Prix marché x 100","(Prix marché - Prix métal) / Prix métal x 100","Prix marché / Prix métal","Prix métal x Taux de marge"],"a":1},{"q":"Quelle catégorie de produit offre la meilleure marge brute en boutique ?","o":["Lingots 250g+","Argent pièces 1oz","Pièces hors cote (si acheteur identifié)","Krugerrand 1oz"],"a":2},{"q":"Quand est-il stratégiquement idéal de racheter de la fonte ?","o":["Quand le cours baisse, car les clients vendent peu","Quand le cours monte, car les clients veulent vendre","En fin d'année uniquement","Uniquement sur commande client"],"a":1}]}];


// ─── CONFIG ──────────────────────────────────────────────────────────────────
var ACCESS_CODE   = "godot2025";
var RC_CODE       = "rc_admin";
var RB_CODE       = "rb_boutique";
var DIR_CODE      = "dir_fortunaqui";
var MAX_ATTEMPTS  = 2;
var MANAGER_CODES = [RC_CODE, RB_CODE, DIR_CODE];

// ─── STATE ───────────────────────────────────────────────────────────────────
var ST = { user:null, poste:null, isManager:false, role:"", page:"home", mod:null, sec:0, qa:{}, qs:{}, mgrTab:"dash" };
var ED = { view:"list", modId:null, tab:"info", editSection:-1, editQuiz:-1 };

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function getAllData()      { try{return JSON.parse(localStorage.getItem("gf_all")||"{}")}catch(e){return{}} }
function saveAll(d)        { localStorage.setItem("gf_all", JSON.stringify(d)) }
function getUD()           { return getUserData(ST.user) }
function saveUD(d)         { d._poste=ST.poste; saveUserData(ST.user,d) }
function getUserData(name) {
  var all=getAllData();
  if(!all[name]) all[name]={done:[],scores:{},attempts:{},history:{},_poste:""};
  return all[name];
}
function saveUserData(name,data){ var all=getAllData(); all[name]=data; saveAll(all) }
function getCustomMods()  { try{return JSON.parse(localStorage.getItem("gf_custom")||"[]")}catch(e){return[]} }
function saveCustomMods(m){ localStorage.setItem("gf_custom",JSON.stringify(m)) }
function getOverrides()   { try{return JSON.parse(localStorage.getItem("gf_overrides")||"{}")}catch(e){return{}} }
function saveOverrides(o) { localStorage.setItem("gf_overrides",JSON.stringify(o)) }

// ─── MOD RESOLUTION ──────────────────────────────────────────────────────────
function getEffectiveMod(id){
  var base=MODS.find(function(x){return x.id===id});
  if(!base) return getCustomMods().find(function(x){return x.id===id});
  var ov=getOverrides()[id];
  if(!ov) return base;
  var m=JSON.parse(JSON.stringify(base));
  if(ov.quiz)     m.quiz=ov.quiz;
  if(ov.sections) m.sections=ov.sections;
  if(ov.title)    m.title=ov.title;
  if(ov.dur)      m.dur=ov.dur;
  if(ov.level)    m.level=ov.level;
  return m;
}
function getAllMods(){
  return MODS.map(function(m){return getEffectiveMod(m.id)}).concat(getCustomMods());
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s){
  var r=String(s||"");
  r=r.split("&").join("&amp;");
  r=r.split("<").join("&lt;");
  r=r.split(">").join("&gt;");
  r=r.split('"').join("&quot;");
  return r;
}
function setHTML(id,html){ var el=document.getElementById(id); if(el) el.innerHTML=html }
function toast(msg){
  var t=document.getElementById("gf-toast");
  if(!t){
    t=document.createElement("div"); t.id="gf-toast";
    t.style.cssText="position:fixed;bottom:24px;right:24px;background:#1B2A4A;color:#C8A84B;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s";
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity="1";
  clearTimeout(t._t); t._t=setTimeout(function(){t.style.opacity="0"},2400);
}

// ─── LOGIN / LOGOUT ──────────────────────────────────────────────────────────
function doLogin(){
  var nom=document.getElementById("inp-nom").value.trim();
  var poste=document.getElementById("inp-poste").value;
  var pwd=document.getElementById("inp-pwd").value.trim();
  var err=document.getElementById("login-err");
  if(!nom||!poste||!pwd){err.style.display="block";err.textContent="Veuillez remplir tous les champs.";return}
  if(MANAGER_CODES.indexOf(pwd)>=0){
    ST.user=nom; ST.poste=poste; ST.isManager=true;
    ST.role=pwd===DIR_CODE?"Directeur(trice)":pwd===RB_CODE?"Responsable Boutique":"Responsable Conformite";
    err.style.display="none";
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("app-wrap").style.display="flex";
    document.getElementById("user-label").textContent=nom+" · "+ST.role;
    renderManager(); return;
  }
  if(pwd===ACCESS_CODE){
    ST.user=nom; ST.poste=poste; ST.isManager=false; ST.role="";
    err.style.display="none";
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("app-wrap").style.display="flex";
    document.getElementById("user-label").textContent=nom+" · "+poste;
    goHome(); return;
  }
  err.style.display="block"; err.textContent="Code d'acces incorrect.";
}
function doLogout(){
  ST.user=null; ST.isManager=false; ST.page="home";
  document.getElementById("login-wrap").style.display="flex";
  document.getElementById("app-wrap").style.display="none";
  document.getElementById("inp-pwd").value="";
}

// ─── MANAGER DASHBOARD ───────────────────────────────────────────────────────
function mgrTabs(){
  return '<button class="tab'+(ST.mgrTab==="dash"?" active":"")+'" onclick="ST.mgrTab=\'dash\';renderManager()">Tableau de bord</button>'+
         '<button class="tab'+(ST.mgrTab==="mods"?" active":"")+'" onclick="ST.mgrTab=\'mods\';goManagerMods()">Ma formation</button>'+
         '<button class="tab'+(ST.mgrTab==="editor"?" active":"")+'" onclick="ST.mgrTab=\'editor\';renderEditor()">Editeur</button>'+
         '<button class="tab" onclick="doLogout()">Deconnexion</button>';
}

function renderManager(){
  ST.mgrTab="dash";
  setHTML("tabs", mgrTabs());
  document.getElementById("prog").style.width="100%";
  var badge=document.getElementById("top-badge");
  badge.textContent=ST.role||"Manager"; badge.className="pill p-blue";

  var all=getAllData();
  var agents=Object.keys(all).filter(function(k){return k!=="__mgr__"});

  if(!agents.length){
    setHTML("content",
      '<div class="mgr-hero"><div class="mgr-title">Tableau de bord — '+esc(ST.role)+'</div>'+
      '<div class="mgr-sub">SAS FORTUNAQUI · Perpignan</div></div>'+
      '<div class="card" style="text-align:center;padding:32px;color:#888">Aucun collaborateur enregistre pour l\'instant.</div>');
    return;
  }

  var totalDone=0, totalBlocked=0;
  agents.forEach(function(a){
    var d=all[a];
    if(d.done&&d.done.length===MODS.length) totalDone++;
    MODS.forEach(function(m){
      var att=(d.attempts&&d.attempts[m.id])||0;
      var done=d.done&&d.done.includes(m.id);
      if(att>=MAX_ATTEMPTS&&!done) totalBlocked++;
    });
  });

  var modHeaders=MODS.map(function(m){return '<th style="text-align:center;font-size:11px">'+m.code+'</th>'}).join("");
  var rows=agents.map(function(agent){
    var d=getUserData(agent);
    var p2=(all[agent]&&all[agent]._poste)||"—";
    var cells=MODS.map(function(m){
      var done=d.done.includes(m.id);
      var att=d.attempts[m.id]||0;
      var sc=d.scores[m.id];
      if(done)             return '<td style="text-align:center"><span class="pill p-green" style="font-size:10px">'+sc+'%</span></td>';
      if(att>=MAX_ATTEMPTS)return '<td style="text-align:center"><span class="pill p-red" style="font-size:10px">Bloque</span></td>';
      if(att>0)            return '<td style="text-align:center"><span class="pill p-amber" style="font-size:10px">'+att+'/'+MAX_ATTEMPTS+'</span></td>';
      return '<td style="text-align:center"><span style="color:#ccc;font-size:12px">—</span></td>';
    }).join("");

function showDetail(agent){

  var modCards=MODS.map(function(m){
    var done=d.done.includes(m.id);
    var att=d.attempts[m.id]||0;
    var hist=(d.history&&d.history[m.id])||[];
    var rows2=!hist.length?'<div style="font-size:12px;color:#aaa">Aucune tentative.</div>':
      hist.map(function(h,i){
        return '<div class="attempt-row">'+
          '<span class="pill '+(h.pass?"p-green":i===hist.length-1&&!h.pass&&hist.length>=MAX_ATTEMPTS?"p-red":"p-amber")+'">'+h.score+'%</span>'+
          '<span>'+(h.pass?"&#10003; Valide":"&#10007; Echec")+' — Tentative '+(i+1)+'</span>'+
          '<span style="color:#aaa;margin-left:auto">'+h.date+'</span></div>';
      }).join("");
    var resetBtn=(att>=MAX_ATTEMPTS&&!done)?
      '<button class="btn-reset-agent" onclick="resetAttempts('+JSON.stringify(agent)+','+JSON.stringify(m.id)+')">Autoriser une tentative</button>':"";
    return '<div class="mod-result">'+
      '<div class="mod-result-title">'+m.code+' — '+esc(m.title)+
      ' <span class="pill '+(done?"p-green":att>=MAX_ATTEMPTS?"p-red":"p-grey")+'" style="float:right">'+
      (done?"Valide":att>=MAX_ATTEMPTS?"Bloque":"—")+'</span></div>'+
      rows2+resetBtn+'</div>';
  }).join("");
  var printBtn=d.done.length===MODS.length?
    '<button class="btn btn-gold" onclick="printAttestation('+JSON.stringify(agent)+')">Attestation</button>':"";

    '<div class="modal-title">'+esc(agent)+'</div>'+

    modCards+

    '<button class="btn btn-primary" onclick="closeModal()">Fermer</button>'+

function sendMsg(agent){
  var subj=document.getElementById("msg-subj").value;
  var body=document.getElementById("msg-body").value.trim();
  if(!body){toast("Ecrivez un message avant d\'envoyer");return}
  var all=getAllData();
  if(!all[agent]) all[agent]={done:[],scores:{},attempts:{},history:{},_poste:""};
  if(!all[agent]._msgs) all[agent]._msgs=[];
  all[agent]._msgs.push({
    from:ST.user, role:ST.role, subj:subj, body:body,
    date:new Date().toLocaleDateString("fr-FR"), read:false
  });
  saveAll(all);
  closeModal();
  toast("Message envoye a "+agent+" ✓");
}

  var d=getUserData(ST.user);

  var items=unread.map(function(m){

function exportCSV(){
  var all=getAllData();
  var agents=Object.keys(all).filter(function(k){return k!=="__mgr__"});
  var csv="Collaborateur,Poste,"+MODS.map(function(m){return m.code}).join(",")+",Statut\n";
  agents.forEach(function(a){
    var d=getUserData(a);
    var p2=(all[a]&&all[a]._poste)||"";
    var cells=MODS.map(function(m){
      if(d.done.includes(m.id)) return d.scores[m.id]+"%";
      var att=d.attempts[m.id]||0;
      return att>=MAX_ATTEMPTS?"Bloque":att>0?att+"/"+MAX_ATTEMPTS:"Non commence";
    });
    var status=d.done.length===MODS.length?"Certifie":d.done.length>0?d.done.length+"/"+MODS.length:"Debut";
    csv+='"'+a+'","'+p2+'",'+cells.join(",")+","+status+"\n";
  });
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="formation_godot.csv"; a.click();
}

function startEditBuiltin(id){
  ED.view="builtin"; ED.modId=id; ED.editQuiz=-1;
  var ov=getOverrides();
  if(!ov[id]){
    var base=MODS.find(function(x){return x.id===id});
    ov[id]={quiz:JSON.parse(JSON.stringify(base.quiz))};
    saveOverrides(ov);
  }
  renderEditorBuiltin(id);
}
function doResetBuiltin(id){
  if(!confirm("Reinitialiser "+id+" a sa version originale ? Toutes les modifications seront perdues."))return;
  var ov=getOverrides(); delete ov[id]; saveOverrides(ov);
  renderEditorList(); toast("Module reinitialise");
}
function renderEditorBuiltin(id){
  ED.view="builtin"; ED.modId=id;
  var ov=getOverrides();
  var base=MODS.find(function(x){return x.id===id});
  var quiz=(ov[id]&&ov[id].quiz)?ov[id].quiz:base.quiz;
  var hasOv=!!ov[id];
  var items=quiz.map(function(q,qi){
    var isEdit=ED.editQuiz===qi;
    var editForm=isEdit?(
      '<div style="margin-top:10px">'+
      '<div class="ed-form-group"><label class="ed-form-label">Question</label>'+
      '<input class="ed-form-input" id="bq-txt" value="'+esc(q.q||'')+'"></div>'+
      [0,1,2,3].map(function(oi){
        return '<div class="ed-form-group"><label class="ed-form-label">'+
          'Reponse '+["A","B","C","D"][oi]+
          ' <input type="radio" name="bq-cor" value="'+oi+'" '+(q.a===oi?"checked":"")+'>  Bonne reponse</label>'+
          '<input class="ed-form-input" id="bq-opt-'+oi+'" value="'+esc((q.o||[])[oi]||'')+'"></div>';
      }).join("")+
      '<div style="display:flex;gap:8px">'+
      '<button class="btn btn-primary" onclick="saveBuiltinQ('+qi+')">Enregistrer</button>'+
      '<button class="btn" onclick="ED.editQuiz=-1;renderEditorBuiltin(ED.modId)">Annuler</button>'+
      '</div></div>'
    ):"";
    return '<div class="ed-quiz-item">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
      '<span class="ed-quiz-num">Q'+(qi+1)+'</span>'+
      '<span style="font-size:12px;color:#1B2A4A;flex:1;font-weight:600">'+esc(q.q)+'</span>'+
      '<button class="ed-btn-sm" onclick="ED.editQuiz='+qi+';renderEditorBuiltin(ED.modId)">Modifier</button>'+
      '</div>'+editForm+'</div>';
  }).join("");
  setHTML("content",
    '<div class="ed-wrap">'+
    '<div class="ed-toolbar">'+
    '<div><div class="ed-title">Modifier questions : '+esc(base.title)+'</div>'+
    '<div style="font-size:11px;color:#888;margin-top:2px">Les modifications remplacent les questions officielles pour tous les utilisateurs de cet appareil.</div></div>'+
    '<div style="display:flex;gap:8px">'+
    '<button class="btn" onclick="renderEditorList()">Retour</button>'+
    (hasOv?'<button class="btn danger" onclick="doResetBuiltin('+JSON.stringify(id)+')" style="background:#fff5f5;color:#a32d2d;border-color:#fbb">Reinitialiser</button>':'')+
    '</div></div>'+
    items+
    '<div class="ok-box" style="margin-top:10px">Modifiez les questions et enregistrez-les une par une. Reinitialiser revient a la version officielle.</div>'+
    '</div>');
}
function saveBuiltinQ(qi){
  var id=ED.modId;
  var ov=getOverrides();
  if(!ov[id]||!ov[id].quiz){
    var base=MODS.find(function(x){return x.id===id});
    if(!ov[id]) ov[id]={};
    ov[id].quiz=JSON.parse(JSON.stringify(base.quiz));
  }
  ov[id].quiz[qi].q=document.getElementById("bq-txt").value.trim()||"Question ?";
  ov[id].quiz[qi].o=[0,1,2,3].map(function(oi){return document.getElementById("bq-opt-"+oi).value.trim()||"Reponse "+(oi+1)});
  var sel=document.querySelector("input[name='bq-cor']:checked");
  ov[id].quiz[qi].a=sel?parseInt(sel.value):0;
  saveOverrides(ov);
  ED.editQuiz=-1;
  renderEditorBuiltin(id);
  toast("Question sauvegardee");
}

// ─── APP NAVIGATION ───────────────────────────────────────────────────────────
function renderTabs(){
  var d=getUD();
  var isHome=ST.page==="home";
  var tabHtml='<button class="tab'+(isHome?" active":"")+'" onclick="goHome()">Accueil</button>';
  getAllMods().forEach(function(m){
    var done=d.done.includes(m.id);
    var att=d.attempts[m.id]||0;
    // Managers have no attempt blocks and see all modules
    var locked=att>=MAX_ATTEMPTS&&!done&&!ST.isManager;
    var active=ST.page==="mod"&&ST.mod===m.id;
    var stl=locked?' style="color:#e24b4a"':"";
    var prefix=locked?"🔒 ":done?"✓ ":"";
    tabHtml+='<button class="tab'+(active?" active":"")+(done?" done":"")+'"'+stl+' onclick="goMod('+JSON.stringify(m.id)+')">' +prefix+m.code+" "+esc(m.title)+'</button>';
  });
  if(ST.isManager){
    tabHtml+=
      '<button class="tab" onclick="ST.mgrTab=\'dash\';renderManager()">Tableau de bord</button>'+
      '<button class="tab" onclick="renderEditor()">Editeur</button>'+
      '<button class="tab" onclick="doLogout()">Deconnexion</button>';
  } else {
    tabHtml+='<button class="tab" onclick="doLogout()">Deconnexion</button>';
  }
  setHTML("tabs",tabHtml);
}
function renderProg(){
  var d=getUD();
  var p=Math.round(d.done.length/getAllMods().length*100);
  document.getElementById("prog").style.width=p+"%";
  var b=document.getElementById("top-badge");

}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function doReset(){
  if(confirm("Reinitialiser toute la progression ?")){localStorage.removeItem("gf_all");location.reload()}
}
function goHome(){
  ST.page="home"; ST.mod=null; ST.sec=0;
  renderTabs(); renderProg();
  // Check for unread messages
  checkMsgs();
  var d=getUD();
  var allMods=getAllMods();
  var allDone=d.done.length===allMods.length;
  var cert=allDone?
    '<div class="cert-box"><div class="cert-title">Formation Validee — '+esc(ST.user)+'</div>'+
    '<div class="cert-sub">Tous les modules valides · Attestation disponible aupres du responsable</div></div>':"";
  var cards=allMods.map(function(m){
    var done=d.done.includes(m.id);
    var att=d.attempts[m.id]||0;
    var locked=att>=MAX_ATTEMPTS&&!done&&!ST.isManager;
    var sc=d.scores[m.id];
    var attLeft=Math.max(0,MAX_ATTEMPTS-att);
    var scol=done?"#27500A":locked?"#a32d2d":att>0?"#633806":"#aaa";
    var stxt=done?"✓ Valide — "+sc+"%":
             locked?"🔒 Bloque — contactez votre responsable":
             att>0?att+"/"+MAX_ATTEMPTS+" tentative(s) — "+attLeft+" restante(s)":
             m.id==="m5"?"★ Expert Orion Academy":"";
    return '<div class="mc'+(done?" done":"")+(locked?" locked":"")+'" onclick="goMod('+JSON.stringify(m.id)+')">' +
      '<div class="mc-code">'+m.code+'</div>'+
      '<div class="mc-title">'+esc(m.title)+'</div>'+
      '<div class="mc-meta">'+esc(m.dur)+' · '+esc(m.level)+'</div>'+
      '<div class="mc-status" style="color:'+scol+'">'+stxt+'</div></div>';
  }).join("");
  var nextMod=allMods.find(function(m){var d2=getUD();return !d2.done.includes(m.id)&&(d2.attempts[m.id]||0)<MAX_ATTEMPTS})||allMods[0];
  var btnTxt=!d.done.length?"Commencer →":allDone?"Revoir les modules":"Continuer →";
  setHTML("content",
    cert+'<div class="home-grid">'+cards+'</div>'+
    '<div class="btn-row" style="justify-content:flex-start;margin-top:0">'+
    '<button class="btn btn-primary" onclick="goMod('+JSON.stringify(nextMod.id)+')">'+btnTxt+'</button>'+
    (d.done.length>0?'<button class="btn" onclick="doReset()">Reinitialiser</button>':"")+
    '</div>');
}

// ─── MODULE NAV ───────────────────────────────────────────────────────────────
function goMod(id){
  var m=getAllMods().find(function(x){return x.id===id}); if(!m)return;
  var d=getUD();
  var att=d.attempts[id]||0;
  var done=d.done.includes(id);
  // MOG prerequisite — but not for managers
  if(m.id==="m5"&&!ST.isManager){
    var bases=["m1","m2","m3","m4"];
    var ok=bases.every(function(mid){return d.done.includes(mid)});
    if(!ok){
      alert("Masters of Gold\n\nAccessible apres M1 a M4.\nModules manquants : "+
        bases.filter(function(mid){return !d.done.includes(mid)}).join(", ")); return;
    }
  }
  // Attempt limit — NOT applied to managers
  if(att>=MAX_ATTEMPTS&&!done&&!ST.isManager){
    alert("Module bloque — 2 tentatives epuisees.\nContactez votre responsable."); return;
  }
  ST.page="mod"; ST.mod=id; ST.sec=0; ST.qa={}; ST.qs={};
  renderTabs(); renderProg(); renderSec();
}

function renderSec(){
  var m=getAllMods().find(function(x){return x.id===ST.mod}); if(!m)return;
  if(ST.sec===m.sections.length){renderQuiz(m);return}
  var sec=m.sections[ST.sec];
  var prevBtn=ST.sec>0?'<button class="btn" onclick="ST.sec--;renderSec()">← Precedent</button>':"";
  var nextLbl=ST.sec<m.sections.length-1?"Section suivante →":"Passer l\'evaluation →";
  setHTML("content",
    '<div class="hero"><div class="hero-code">'+m.code+" · Section "+(ST.sec+1)+"/"+m.sections.length+'</div>'+
    '<div class="hero-title">'+esc(sec.t)+'</div>'+
    '<div class="hero-meta"><span>'+esc(m.title)+'</span><span>'+esc(m.dur)+" · "+esc(m.level)+'</span></div></div>'+
    '<div class="section">'+sec.html+'</div>'+
    '<div class="btn-row">'+prevBtn+
    '<button class="btn" onclick="goHome()">Accueil</button>'+
    '<button class="btn btn-primary" onclick="ST.sec++;renderSec()">'+nextLbl+'</button></div>');
  window.scrollTo(0,0);
  if(typeof calcLingot==="function"&&document.getElementById("calc-brut")) calcLingot();
  if(typeof calcTax==="function"&&document.getElementById("t-vente"))     calcTax();
}

// ─── QUIZ ─────────────────────────────────────────────────────────────────────
function renderQuiz(m){
  var d=getUD();
  var att=d.attempts[m.id]||0;
  var attLeft=MAX_ATTEMPTS-att;
  var sub=ST.qs[m.id];
  // Managers: show quiz freely with no attempt counter displayed
  var attBar=(!sub&&!ST.isManager)?
    '<div class="attempts-bar">'+
    Array.from({length:MAX_ATTEMPTS}).map(function(_,i){
      return '<div class="att-dot '+(i<att?"att-used":"att-avail")+'"></div>';
    }).join("")+
    '<span>'+attLeft+" tentative"+(attLeft>1?"s":"")+" restante"+(attLeft>1?"s":"")+" sur "+MAX_ATTEMPTS+'</span></div>':"";
  var questions=m.quiz.map(function(q,qi){
    var ua=ST.qa[qi];
    var opts=q.o.map(function(opt,oi){
      var cls="quiz-opt",rc="radio";
      if(sub){
        if(oi===q.a){cls+=" correct";rc+=" cr"}
        else if(oi===ua&&ua!==q.a){cls+=" wrong";rc+=" wr"}
      } else if(oi===ua){cls+=" selected";rc+=" filled"}
      var cl=sub?"":"onclick=\"selA("+qi+","+oi+")\"";
      return '<div class="'+cls+'" '+cl+'><div class="'+rc+'"></div>'+esc(opt)+'</div>';
    }).join("");
    return '<div class="quiz-q"><div class="quiz-qnum">Question '+(qi+1)+"/"+m.quiz.length+'</div>'+
      '<div class="quiz-qtxt">'+esc(q.q)+'</div>'+opts+'</div>';
  }).join("");
  var submitBtn=!sub?'<button class="btn btn-gold" onclick="subQ('+JSON.stringify(m.id)+')">Soumettre l\'evaluation</button>':"";
  setHTML("content",
    '<div class="hero" style="background:#2d1f6e"><div class="hero-code">Evaluation — '+m.code+'</div>'+
    '<div class="hero-title">'+esc(m.title)+'</div>'+
    '<div class="hero-meta"><span>'+m.quiz.length+' questions</span><span>Score minimum : 80%</span></div></div>'+
    attBar+questions+
    '<div class="btn-row">'+
    '<button class="btn" onclick="ST.sec=getAllMods().find(function(x){return x.id===ST.mod}).sections.length-1;renderSec()">← Retour au cours</button>'+
    submitBtn+'</div>');
  window.scrollTo(0,0);
}
function selA(qi,oi){
  ST.qa[qi]=oi;
  renderQuiz(getAllMods().find(function(x){return x.id===ST.mod}));
}
function subQ(mid){
  var m=getAllMods().find(function(x){return x.id===mid});
  var ok=0;
  m.quiz.forEach(function(q,i){if(ST.qa[i]===q.a)ok++});
  var sc=Math.round(ok/m.quiz.length*100);
  var pass=sc>=80;
  var d=getUD();
  if(!d.attempts[mid]) d.attempts[mid]=0;
  d.attempts[mid]++;
  if(!d.history) d.history={};
  if(!d.history[mid]) d.history[mid]=[];
  d.history[mid].push({score:sc,pass:pass,date:new Date().toLocaleDateString("fr-FR")});
  if(pass&&!d.done.includes(mid)) d.done.push(mid);
  d.scores[mid]=sc;
  saveUD(d); ST.qs[mid]=true; renderProg(); renderTabs();
  var att=d.attempts[mid];
  var attLeft=Math.max(0,MAX_ATTEMPTS-att);
  var nxtIdx=getAllMods().findIndex(function(x){return x.id===mid});
  var hasNext=nxtIdx<getAllMods().length-1;
  var nextBtn=pass&&hasNext?'<button class="btn btn-primary" onclick="goMod('+JSON.stringify(getAllMods()[nxtIdx+1].id)+')">Module suivant →</button>':"";
  var retryBtn=!pass&&attLeft>0?'<button class="btn btn-primary" onclick="ST.qa={};ST.qs['+JSON.stringify(mid)+']=false;renderSec()">Revoir le cours</button>':"";
  var msg=pass?"Score ≥ 80% — module valide. Attestation a signer aupres du responsable.":
          attLeft>0?"Score &lt; 80%. Il vous reste <strong>"+attLeft+" tentative"+(attLeft>1?"s":"")+"</strong>. Relisez le cours.":
          "<strong>Les 2 tentatives sont epuisees.</strong> Contactez votre responsable pour etre debloque.";
  setHTML("content",
    '<div class="score-wrap">'+
    '<div class="score-circle '+(pass?"sc-pass":"sc-fail")+'">'+
    '<div class="sc-num" style="color:'+(pass?"#27500A":"#7a1a1a")+'">'+sc+'%</div>'+
    '<div class="sc-sub">'+ok+"/"+m.quiz.length+'</div></div>'+
    '<div style="font-size:20px;font-weight:700;color:'+(pass?"#3B6D11":"#a32d2d")+';margin-bottom:8px">'+(pass?"Module valide ✓":"Score insuffisant")+'</div>'+
    '<div style="font-size:13px;color:#666;max-width:420px;margin:0 auto;line-height:1.7">'+msg+'</div></div>'+
    '<div class="btn-row" style="justify-content:center">'+retryBtn+nextBtn+
    '<button class="btn" onclick="goHome()">Accueil</button></div>');
  window.scrollTo(0,0);
}

// ─── CALCULATORS ─────────────────────────────────────────────────────────────
function calcLingot(){
  var b=parseFloat(document.getElementById("calc-brut").value)||0;
  var t=parseFloat(document.getElementById("calc-titre").value)||0;
  var c=parseFloat(document.getElementById("calc-cours").value)||0;
  var mg=parseFloat(document.getElementById("calc-marge").value)||0;
  var fin=b*(t/1000),val=fin*c,prix=val*(1-mg/100),marge=val-prix;
  document.getElementById("res-poids").textContent=fin.toFixed(3)+"g";
  document.getElementById("res-valeur").textContent=val.toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  document.getElementById("res-prix").textContent=prix.toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  document.getElementById("res-marge").textContent=marge.toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
}
function calcTax(){
  var v=parseFloat(document.getElementById("t-vente").value)||0;
  var a=parseFloat(document.getElementById("t-achat").value)||0;
  var y=parseInt(document.getElementById("t-annees").value)||0;
  var tmp=v*0.115;
  document.getElementById("tmp-base").textContent="Base : "+v.toLocaleString("fr-FR",{style:"currency",currency:"EUR"})+" x 11,5%";
  document.getElementById("tmp-taxe").textContent=tmp.toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  document.getElementById("tmp-net").textContent="Net percu : "+(v-tmp).toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  var abat=y>=22?100:y>=3?(y-2)*5:0;
  var pv=Math.max(0,v-a),pvN=pv*(1-abat/100),tpv=pvN*0.362;
  document.getElementById("tpv-pct").textContent=abat;
  document.getElementById("tpv-pv").textContent="PV brute : "+pv.toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  document.getElementById("tpv-abat").textContent="Reduction : -"+(pv*abat/100).toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  document.getElementById("tpv-taxe").textContent=y>=22?"0,00 € (exonere)":tpv.toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  document.getElementById("tpv-net").textContent="Net percu : "+(v-tpv).toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
  var c2=document.getElementById("tax-conseil");
  if(y>=22){c2.style.background="#f0fae8";c2.style.color="#27500A";c2.textContent="Exoneration totale — TPV obligatoirement plus avantageuse."}
  else if(tmp<tpv){c2.style.background="#fff5f5";c2.style.color="#a32d2d";c2.textContent="TMP ("+tmp.toLocaleString("fr-FR",{style:"currency",currency:"EUR"})+") plus avantageux."}
  else{c2.style.background="#f0fae8";c2.style.color="#27500A";c2.textContent="TPV ("+tpv.toLocaleString("fr-FR",{style:"currency",currency:"EUR"})+") plus avantageux."}
}

document.addEventListener("DOMContentLoaded",function(){
  var pwd=document.getElementById("inp-pwd");
  var nom=document.getElementById("inp-nom");
  if(pwd) pwd.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
  if(nom) nom.addEventListener("keydown",function(e){if(e.key==="Enter"){var p=document.getElementById("inp-poste");if(p)p.focus()}});
});

</script>
