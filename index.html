<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-title">Godot &amp; Fils</div>
    <div class="login-logo-sub">Formation Métier · SAS FORTUNAQUI</div>
  </div>
  <div class="form-group">
    <label class="form-label" for="inp-nom">Nom et Prénom</label>
    <input class="form-input" id="inp-nom" type="text" placeholder="Ex : Marie Dupont" autocomplete="name">
  </div>
  <div class="form-group">
    <label class="form-label" for="inp-poste">Poste</label>
    <select class="form-select" id="inp-poste">
      <option value="">-- Sélectionner --</option>
      <option>Agent de comptoir</option>
      <option>Responsable boutique</option>
      <option>Responsable Conformité</option>
      <option>Directeur(trice)</option>
      <option>Stagiaire</option>
      <option>Autre</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label" for="inp-pwd">Code d'accès</label>
    <input class="form-input" id="inp-pwd" type="password" placeholder="Code fourni par votre responsable">
  </div>
  <button class="btn-login" onclick="doLogin()">Accéder à la formation</button>
  <div class="login-err" id="login-err">Nom, poste et code d'accès requis.</div>
  <div class="login-note">Formation interne confidentielle — SAS FORTUNAQUI · Perpignan</div>
</div>
</div>

  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="top-badge" class="pill p-amber"></div>
    <button onclick="doLogout()" style="background:none;border:1px solid #3d5a80;color:#8fa3c0;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600">Déconnexion</button>
  </div>

</div>


<script>
var MODS=[{"id":"m1","code":"M1","title":"Change Manuel","dur":"3h","level":"Débutant → Confirmé","sections":[{"t":"Fondamentaux du change","html":"<div class=\"card\"><div class=\"step-label\">Qu'est-ce que le change manuel ?</div><div class=\"step-detail\" style=\"margin-top:5px\">Le change manuel est l'échange physique de billets étrangers contre des euros en boutique. SAS FORTUNAQUI est agréée changeur manuel par l'ACPR — obligation légale.</div></div><div class=\"info-box\"><strong>Devises courantes à Perpignan :</strong> GBP · USD · CHF · NOK · AED · MXN · CAD · JPY</div><div class=\"section-title\">Comment lire un cours de change</div><table class=\"tbl\"><thead><tr><th>Type</th><th>Définition</th><th>Exemple EUR/GBP=0,85</th></tr></thead><tbody><tr><td>Cours ECB</td><td>Taux officiel BCE</td><td>1€ = 0,850 GBP</td></tr><tr><td class=\"c-green\">Cours achat</td><td>Boutique achète vos devises</td><td>1€ = 0,830 GBP</td></tr><tr><td class=\"c-red\">Cours vente</td><td>Boutique vend des devises</td><td>1€ = 0,870 GBP</td></tr></tbody></table>"},{"t":"Procédure et seuils","html":"<div class=\"alert-box\">🔴 POLITIQUE FORTUNAQUI : Identification obligatoire DÈS LE 1ER CENTIME.</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Accueil</div><div class=\"step-detail\">Identifier le sens (achat/vente) et la devise.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Vérification billets</div><div class=\"step-detail\">Lampe UV pour tout billet ≥ 20 €. Refus immédiat si suspect.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Annonce du cours</div><div class=\"step-detail\">Calculer et annoncer AVANT la transaction. Accord client obligatoire.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Identification client</div><div class=\"step-detail\">Selon les seuils ci-dessous — aucune exception.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Registre de change</div><div class=\"step-detail\">Inscrire toutes les opérations ≥ 1 000 €.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Remise des fonds</div><div class=\"step-detail\">Compter DEVANT le client à voix haute. Remettre la facture.</div></div></div><div class=\"step-row\"><div class=\"step-num\">7</div><div class=\"step-body\"><div class=\"step-label\">Clôture caisse</div><div class=\"step-detail\">Équilibrer en fin de journée.</div></div></div></div><div class=\"section-title\">Seuils FORTUNAQUI</div><table class=\"tbl\"><thead><tr><th>Montant</th><th>Obligation</th><th>Base légale</th></tr></thead><tbody><tr><td class=\"c-green\">0–800 €</td><td>Facture nominative (nom, prénom, date/lieu naissance, nationalité)</td><td>Politique interne</td></tr><tr><td class=\"c-amber\">800–1 000 €</td><td>Pièce d'identité valide obligatoire</td><td>Politique interne</td></tr><tr><td class=\"c-orange\">1 000–10 000 €</td><td>Pièce ID + registre de change</td><td>Art. L.561-2 (8°) CMF</td></tr><tr><td class=\"c-red\">≥ 10 000 €</td><td>KYC complet + justificatif origine fonds + validation RC</td><td>Vigilance renforcée CMF</td></tr></tbody></table>"},{"t":"GAFI & Soupçons Tracfin","html":"<table class=\"tbl\"><thead><tr><th>Liste GAFI</th><th>Signification</th><th>Conduite</th></tr></thead><tbody><tr><td class=\"c-red\">Noire</td><td>Défaillances graves (Corée du Nord, Iran…)</td><td class=\"c-red\">REFUS SYSTÉMATIQUE</td></tr><tr><td class=\"c-amber\">Grise</td><td>Sous surveillance — màj juin et octobre</td><td>Vigilance renforcée + documentation</td></tr><tr><td class=\"c-green\">Hors liste</td><td>Pays conformes GAFI</td><td>Procédure standard</td></tr></tbody></table><div class=\"section-title\" style=\"margin-top:16px\">Signaux d'alerte</div><div class=\"card\"><div class=\"signal\"><div style=\"font-size:15px;flex-shrink:0\">⚠️</div><div><div class=\"sname\">Fractionnement</div><div class=\"sdesc\">Retours multiples pour rester sous 1 000 €</div></div></div><div class=\"signal\"><div style=\"font-size:15px;flex-shrink:0\">⚠️</div><div><div class=\"sname\">Incohérence profil</div><div class=\"sdesc\">Montant incompatible avec le profil du client</div></div></div><div class=\"signal\"><div style=\"font-size:15px;flex-shrink:0\">⚠️</div><div><div class=\"sname\">Pression/Nervosité</div><div class=\"sdesc\">Refuse son identité, questions sur les seuils</div></div></div><div class=\"signal\"><div style=\"font-size:15px;flex-shrink:0\">⚠️</div><div><div class=\"sname\">Petites coupures usées</div><div class=\"sdesc\">Nombreuses petites coupures — typique des trafics</div></div></div></div><div class=\"alert-box\">🔴 SOUPÇON : (1) Rester calme (2) Refuser poliment (3) Note Interne RC dans l'heure (4) JAMAIS informer le client — tipping-off = délit pénal.</div>"}],"quiz":[{"q":"Quel est le seuil légal d'identification pour le change selon le CMF ?","o":["500 €","1 000 €","3 000 €","10 000 €"],"a":1},{"q":"La politique interne FORTUNAQUI impose une identification dès :","o":["500 €","800 €","1 €","1 000 €"],"a":2},{"q":"Un client revient 4 fois dans la journée avec de petits montants. C'est :","o":["Client régulier","Fractionnement suspect","Change de routine","Aucune anomalie"],"a":1},{"q":"Les listes GAFI sont mises à jour :","o":["Chaque mois","Tous les ans","En juin et octobre","Chaque trimestre"],"a":2},{"q":"En cas de soupçon, la bonne procédure est :","o":["Confronter le client","Demander de revenir","Note RC, refus poli, ne jamais informer le client","Refuser sans rien noter"],"a":2},{"q":"Le registre de change est contrôlable par :","o":["La mairie","L'ACPR","Les clients","La préfecture"],"a":1},{"q":"Le cours d'achat est :","o":["Le taux ECB","Le taux où la boutique achète vos devises","Le plus favorable pour le client","Identique au cours vente"],"a":1},{"q":"Un client veut changer 15 000 € sans justifier l'origine des fonds :","o":["Accepter — légal","Refuser + procédure RC/Tracfin","Demander de revenir avec moins","Accepter avec pièce ID seulement"],"a":1}]},{"id":"m2","code":"M2","title":"Rachat de Fonte","dur":"4h","level":"Débutant → Confirmé","sections":[{"t":"Identification des métaux","html":"<table class=\"tbl\"><thead><tr><th>Carats</th><th>Pureté ‰</th><th>Objets typiques</th><th>Poinçon FR</th></tr></thead><tbody><tr><td class=\"c-amber\">9 ct</td><td>375‰</td><td>Bijoux UK, Espagne, Irlande</td><td>Coquille Saint-Jacques</td></tr><tr><td class=\"c-amber\">14 ct</td><td>585‰</td><td>Bijoux américains, est-européens</td><td>Tête de cheval</td></tr><tr><td class=\"c-amber\">18 ct</td><td>750‰</td><td>Bijouterie fine française</td><td>Aigle (tête)</td></tr><tr><td class=\"c-amber\">22 ct</td><td>916‰</td><td>Bijoux indiens, turcs, Krugerrand</td><td>—</td></tr><tr><td class=\"c-amber\">24 ct</td><td>999‰</td><td>Lingots uniquement</td><td>—</td></tr></tbody></table><div class=\"section-title\" style=\"margin-top:16px\">Code couleur pochettes</div><div class=\"pochette\"><div class=\"pswatch\" style=\"background:#EDE9F5\"></div><strong style=\"color:#5B2D91;font-size:12px;min-width:100px\">Violet</strong><span style=\"font-size:12px;color:#555\">9 ct (375‰)</span></div><div class=\"pochette\"><div class=\"pswatch\" style=\"background:#D6EAF8\"></div><strong style=\"color:#0C447C;font-size:12px;min-width:100px\">Bleu clair</strong><span style=\"font-size:12px;color:#555\">14 ct (585‰)</span></div><div class=\"pochette\"><div class=\"pswatch\" style=\"background:#FDEBD0\"></div><strong style=\"color:#7D3C00;font-size:12px;min-width:100px\">Orange</strong><span style=\"font-size:12px;color:#555\">16 ct (666‰)</span></div><div class=\"pochette\"><div class=\"pswatch\" style=\"background:#FFF9C4\"></div><strong style=\"color:#7A6000;font-size:12px;min-width:100px\">Jaune</strong><span style=\"font-size:12px;color:#555\">18 ct (750‰)</span></div><div class=\"pochette\"><div class=\"pswatch\" style=\"background:#FCE4EC\"></div><strong style=\"color:#880E4F;font-size:12px;min-width:100px\">Rose clair</strong><span style=\"font-size:12px;color:#555\">20 ct (833‰)</span></div><div class=\"pochette\"><div class=\"pswatch\" style=\"background:#F8BBD0\"></div><strong style=\"color:#AD1457;font-size:12px;min-width:100px\">Rose fuchsia</strong><span style=\"font-size:12px;color:#555\">22 ct (916‰)</span></div><div class=\"pochette\"><div class=\"pswatch\" style=\"background:#FFECB3\"></div><strong style=\"color:#B8860B;font-size:12px;min-width:100px\">Doré</strong><span style=\"font-size:12px;color:#555\">24 ct / 999‰</span></div>"},{"t":"Analyse spectromètre et acides","html":"<div class=\"ok-box\"><strong>Spectromètre XRF</strong> — méthode de référence. Non destructif, 30 secondes.<br><strong>Double test acide</strong> — obligatoire en cas de doute ou poinçon illisible.</div><div class=\"section-title\">Protocole XRF</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Calibrer en début de session</div><div class=\"step-detail\">Moins de 24h. Recalibrer si nécessaire.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Nettoyer la surface</div><div class=\"step-detail\">Chiffon doux. Résidus = erreur de 2-3%.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Positionner sur zone massive</div><div class=\"step-detail\">Éviter soudures, fermoirs, agrafes.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Déclencher la mesure</div><div class=\"step-detail\">10-30 sec. Lire le % Au et le titre.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Deux mesures divergentes > 3%</div><div class=\"step-detail\">Double test acide obligatoire.</div></div></div></div><div class=\"section-title\">Protocole acides</div><div class=\"alert-box\">⚠️ EPI OBLIGATOIRES : gants nitrile + lunettes de protection avant toute manipulation.</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">EPI obligatoires</div><div class=\"step-detail\">Gants nitrile + lunettes.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Frotter sur pierre de touche</div><div class=\"step-detail\">Trait ferme de 2 cm.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Acide du titre suspecté</div><div class=\"step-detail\">1-2 gouttes. Observer 30 sec.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Interpréter</div><div class=\"step-detail\">Persiste = titre OK / Décolore = titre inférieur / Disparaît = métal de base.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Second test de confirmation</div><div class=\"step-detail\">Deux tests concordants = titre fiable.</div></div></div></div>"},{"t":"Procédure de rachat","html":"<div class=\"alert-box\">🔴 Identification obligatoire pour TOUT rachat — pièce d'identité TOUJOURS.</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Examen visuel</div><div class=\"step-detail\">Poinçons, état, éléments non-précieux à retirer.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Test du métal</div><div class=\"step-detail\">XRF + double acide si doute.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Pesée contradictoire</div><div class=\"step-detail\">Devant le client, balance certifiée.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Calcul du prix</div><div class=\"step-detail\">Poids brut × Titre × Cours spot × (1-Marge%). Expliquer au client.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Photo du lot</div><div class=\"step-detail\">AVANT d'accepter — intégrée à la facture.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Identification client</div><div class=\"step-detail\">Pièce ID + copie — TOUJOURS.</div></div></div><div class=\"step-row\"><div class=\"step-num\">7</div><div class=\"step-body\"><div class=\"step-label\">Livre de police</div><div class=\"step-detail\">Date, description, poids, titre, prix, identité, N° ID.</div></div></div><div class=\"step-row\"><div class=\"step-num\">8</div><div class=\"step-body\"><div class=\"step-label\">Bon de rachat signé</div><div class=\"step-detail\">2 exemplaires — signature AVANT paiement.</div></div></div><div class=\"step-row\"><div class=\"step-num\">9</div><div class=\"step-body\"><div class=\"step-label\">Formulaire rétractation</div><div class=\"step-detail\">Obligation légale.</div></div></div><div class=\"step-row\"><div class=\"step-num\">10</div><div class=\"step-body\"><div class=\"step-label\">Paiement</div><div class=\"step-detail\">Métaux précieux : virement UNIQUEMENT — Art. L.112-6 CMF. Espèces INTERDITES.</div></div></div></div><div class=\"info-box\">⏱️ <strong>Délai 48h :</strong> aucun lot ne peut être cassé ou envoyé avant 48h après le rachat.</div><div class=\"card\" style=\"background:#fffbf0;border-color:#e8c96a\"><strong>Formule prix de rachat :</strong><br>Poids pur = Poids brut × Titre (ex: 0,750)<br>Valeur théorique = Poids pur × Cours spot<br><strong>Prix = Valeur théorique × (1 − Marge%)</strong><br><br><em>Exemple : 10g × 0,750 × 85€/g × 0,80 = 510 €</em></div>"}],"quiz":[{"q":"Quel titre correspond à une pureté de 750‰ ?","o":["9 ct","14 ct","18 ct","22 ct"],"a":2},{"q":"La couleur de pochette pour l'or 18 ct est :","o":["Violet","Jaune","Bleu clair","Rose fuchsia"],"a":1},{"q":"Un trait qui disparaît au test acide signifie :","o":["Titre inférieur","Métal de base ou plaqué","Titre supérieur","Test non concluant"],"a":1},{"q":"La pesée doit se faire :","o":["En arrière-boutique","Devant le client sur balance certifiée","Après signature","Par un expert externe"],"a":1},{"q":"Le formulaire de rétractation est :","o":["Facultatif","Obligatoire légalement","Seulement pour professionnels","Seulement > 1 000 €"],"a":1},{"q":"Client avec 20 bijoux dépareillés, accepte n'importe quel prix, nerveux :","o":["Client pressé normal","Signal de recel → RC immédiat","Bonne affaire","Client professionnel"],"a":1},{"q":"Le paiement sur les métaux précieux se fait :","o":["En espèces","Par virement uniquement — Art. L.112-6 CMF","Au choix du client","Par chèque certifié"],"a":1},{"q":"Le délai avant casse ou envoi fondeur est de :","o":["24h","48h","72h","1 semaine"],"a":1}]},{"id":"m3","code":"M3","title":"Vente aux Professionnels","dur":"3h","level":"Confirmé","sections":[{"t":"Préparation et expédition","html":"<div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Tri par métal</div><div class=\"step-detail\">Séparer or/argent/platine. Retirer TOUS les éléments non-précieux.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Pesée de contrôle</div><div class=\"step-detail\">Peser le lot brut. Consigner dans le bon de préparation.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Conditionnement</div><div class=\"step-detail\">Sachet hermétique étiqueté : N° lot, métal, poids, date, initiales.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Photo AVANT envoi</div><div class=\"step-detail\">Photographier le lot scellé. Archiver.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Bon de livraison</div><div class=\"step-detail\">N° lot, métal, poids, titre, destination, date.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Transporteur valeurs</div><div class=\"step-detail\">Déclaration de valeur = cours spot × poids pur. Reçu signé obligatoire.</div></div></div></div><div class=\"alert-box\">⚠️ LITIGE POIDS : demander le rapport d'analyse complet. Comparer avec la photo du lot scellé.</div>"},{"t":"TVA et facturation","html":"<table class=\"tbl\"><thead><tr><th>Type de bien</th><th>Régime TVA</th><th>Mention facture</th></tr></thead><tbody><tr><td class=\"c-green\">Or d'investissement</td><td class=\"c-green\">EXONÉRÉ</td><td>Art. 298 sexdecies A CGI</td></tr><tr><td class=\"c-amber\">Or/Argent brut, déchets</td><td>TVA sur la marge</td><td>Préciser le régime</td></tr><tr><td>Bijoux d'occasion</td><td>Régime de la marge</td><td>Art. 297A CGI</td></tr><tr><td>Platine, palladium brut</td><td>TVA 20%</td><td>Standard</td></tr></tbody></table><div class=\"section-title\" style=\"margin-top:16px\">Mentions obligatoires</div><div class=\"card\"><div class=\"signal\"><div style=\"color:#639922;font-size:14px;flex-shrink:0\">✓</div><div class=\"sdesc\">N° facture séquentiel</div></div><div class=\"signal\"><div style=\"color:#639922;font-size:14px;flex-shrink:0\">✓</div><div class=\"sdesc\">Date d'émission</div></div><div class=\"signal\"><div style=\"color:#639922;font-size:14px;flex-shrink:0\">✓</div><div class=\"sdesc\">SIRET + N° TVA SAS FORTUNAQUI</div></div><div class=\"signal\"><div style=\"color:#639922;font-size:14px;flex-shrink:0\">✓</div><div class=\"sdesc\">Identité complète de l'acheteur</div></div><div class=\"signal\"><div style=\"color:#639922;font-size:14px;flex-shrink:0\">✓</div><div class=\"sdesc\">Description : métal, titre, poids (g)</div></div><div class=\"signal\"><div style=\"color:#639922;font-size:14px;flex-shrink:0\">✓</div><div class=\"sdesc\">Prix HT + TVA (ou mention exonération)</div></div></div>"},{"t":"AOEA Pro, 4D et suivi","html":"<div class=\"section-title\">Clôture journalière — AOEA Pro</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Lister rachats du jour</div><div class=\"step-detail\">Trier par titre (9ct/14ct/16ct/18ct/22ct/24ct).</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Créer un lot par titre sur AOEA Pro</div><div class=\"step-detail\">UN LOT = UN TITRE. Ne jamais mélanger.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Valider → N° vente AOEA Pro</div><div class=\"step-detail\">Ce numéro est la référence de toute la chaîne. Le noter.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Clore la session</div><div class=\"step-detail\">Vérifier que tous les lots du jour sont saisis.</div></div></div></div><div class=\"section-title\">Logiciel 4D</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">4D → Vente après titrage</div><div class=\"step-detail\">Statut : ATTENTE DE LIQUIDATION (compte poids fondeur).</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Éditer et archiver la facture 4D</div><div class=\"step-detail\">Noter le N° de facture 4D.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Commentaire virement OBLIGATOIRE — Art. L.112-6 CMF</div><div class=\"step-detail\">Indiquer dans le commentaire bancaire : N° vente AOEA Pro.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Mettre à jour le tableau comptable</div><div class=\"step-detail\">N° facture 4D + montant + N° AOEA Pro. Statut couleur.</div></div></div></div><div class=\"info-box\">🔵 Bleu = En attente | 🟡 Jaune = Envoyé | 🟢 Vert = Vérifié, facturé, payé</div>"}],"quiz":[{"q":"L'or d'investissement est soumis à :","o":["TVA 20%","TVA 10%","Exonération TVA — Art. 298 sexdecies A CGI","TVA sur la marge"],"a":2},{"q":"Le N° AOEA Pro doit figurer dans :","o":["Le livre de police","Le commentaire du virement bancaire","La fiche KYC","Le bon de rachat"],"a":1},{"q":"Dans 4D, 'Vente après titrage' place la vente en :","o":["Statut payé","Attente de liquidation","Archivage","Annulation"],"a":1},{"q":"La couleur 'Envoyé' dans le tableau comptable est :","o":["Vert","Rouge","Bleu","Jaune"],"a":3},{"q":"Peut-on mélanger deux titres dans un lot d'expédition ?","o":["Oui si poids identiques","Non — un lot = un titre.","Oui si fondeur d'accord","Oui pour < 100g"],"a":1},{"q":"Si le fondeur conteste le poids :","o":["Accepter sans discussion","Demander rapport d'analyse + comparer photo lot scellé","Rembourser immédiatement","Ignorer"],"a":1},{"q":"L'assurance d'expédition est basée sur :","o":["Prix de rachat boutique","Cours spot × poids pur","Valeur forfaitaire","Prix catalogue"],"a":1},{"q":"Statut 'Vert' = :","o":["Lot préparé non envoyé","Lot envoyé au fondeur","Vérifié, facturé, payé","En litige"],"a":2}]},{"id":"m4","code":"M4","title":"Comptes Poids","dur":"2h30","level":"Confirmé","sections":[{"t":"Fonctionnement et ouverture","html":"<div class=\"card\"><div class=\"step-label\">Qu'est-ce qu'un compte poids ?</div><div class=\"step-detail\" style=\"margin-top:5px;line-height:1.7\">Compte de dépôt de métal précieux physique. Le client dépose de l'or — nous créditons le poids de métal pur. Il peut acheter, vendre, arbitrer ou demander une livraison physique.</div></div><div class=\"alert-box\">🔴 Compte poids = Stockage pour compte de tiers → obligations LCB-FT dès l'ouverture.</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">CGV signées</div><div class=\"step-detail\">Avant toute ouverture — sans CGV signées, pas de compte.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">KYC complet</div><div class=\"step-detail\">Fiche KYC + pièce ID + bénéficiaire effectif (PM). AVANT tout mouvement.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Contrat de dépôt signé</div><div class=\"step-detail\">Frais, stockage, responsabilité, durée, conditions de clôture.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Pesée contradictoire</div><div class=\"step-detail\">Devant le client — poids noté sur le contrat.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Fiche compte créée</div><div class=\"step-detail\">N° unique, métal, poids initial, valorisation au cours LBMA du jour.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Relevé initial signé</div><div class=\"step-detail\">2 exemplaires — valeur contractuelle.</div></div></div></div>"},{"t":"Gestion et valorisation","html":"<table class=\"tbl\"><thead><tr><th>Opération</th><th>Client</th><th>Boutique</th></tr></thead><tbody><tr><td class=\"c-green\">Crédit</td><td>Apporte métal OU achète</td><td>Peser, analyser, créditer poids pur</td></tr><tr><td class=\"c-red\">Débit</td><td>Vend tout ou partie</td><td>Calculer contre-valeur, virer les fonds</td></tr><tr><td class=\"c-amber\">Arbitrage</td><td>Convertit or ↔ argent</td><td>Vente métal A + crédit métal B au cours du jour</td></tr><tr><td>Retrait physique</td><td>Veut récupérer son métal</td><td>Préparer lingots équivalents, peser, remettre contre reçu</td></tr></tbody></table><div class=\"card\" style=\"background:#fffbf0;border-color:#e8c96a;margin-top:14px\"><strong>Valorisation quotidienne :</strong><br>Solde (g) × Cours LBMA fixing du jour (€/g) = Valeur du compte<br><em>Exemple : 50g × 85 €/g = 4 250 €</em></div>"},{"t":"Clôture et LCB-FT","html":"<div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-detail\">Demande écrite du client. Vérifier identité et signature.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-detail\">Calculer le solde final au cours LBMA du jour de clôture.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-detail\">Client choisit : (a) livraison physique ou (b) vente + virement.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-detail\">Livraison ou virement dans un délai maximum de 5 jours ouvrés.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-detail\">Relevé de clôture + reçu de solde nul signé des deux parties.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-detail\">Archiver le dossier complet 5 ans minimum.</div></div></div></div><div class=\"alert-box\">⚠️ Délai clôture maximum : <strong>5 jours ouvrés</strong> après demande écrite.</div>"}],"quiz":[{"q":"Un compte poids déclenche les obligations LCB-FT :","o":["Seulement > 10 000 €","Dès l'ouverture, quel que soit le montant","Uniquement pour les PM","Jamais"],"a":1},{"q":"La formule de valorisation quotidienne est :","o":["Solde (g) × cours ECB veille","Solde (g) × cours LBMA fixing du jour","Solde (kg) × cours ouverture mois","Valeur ouverture × taux d'intérêt"],"a":1},{"q":"Le délai maximum pour clôturer un compte poids est :","o":["2 jours ouvrés","5 jours ouvrés","10 jours ouvrés","30 jours calendaires"],"a":1},{"q":"Peut-on ouvrir un compte poids sans contrat signé ?","o":["Oui si montant faible","Oui pour clients réguliers","Non — contrat obligatoire avant tout mouvement","Oui en attendant de signer"],"a":2},{"q":"Un arbitrage consiste à :","o":["Fermer et rouvrir un compte","Convertir or en argent (ou inverse) au cours du jour","Vendre tout le solde","Ajouter une devise étrangère"],"a":1},{"q":"La mise à jour KYC doit être effectuée :","o":["Tous les 5 ans","À chaque opération","Annuellement","Jamais si pas de changement"],"a":2},{"q":"Le relevé mensuel doit être :","o":["Envoyé au client et archivé 5 ans","Conservé en boutique uniquement","Transmis à l'ACPR chaque mois","Signé par le client à réception"],"a":0},{"q":"En cas de soupçon sur un compte poids :","o":["Clôturer le compte immédiatement","Informer le client","Note RC + Tracfin — ne jamais informer le client","Bloquer sans consigner"],"a":2}]},{"id":"m5","code":"MOG","title":"Masters of Gold","dur":"4h","level":"Expert · Orion Academy","sections":[{"t":"Les Maîtres de l'Or — Introduction","html":"<div style=\"background:linear-gradient(135deg,#1B2A4A,#2d4272);border-radius:10px;padding:22px 26px;margin-bottom:18px;color:#fff\"><div style=\"font-size:11px;color:#C8A84B;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px\">Orion Academy · Module Expert</div><div style=\"font-size:22px;font-weight:700;margin-bottom:6px\">Les Maîtres de l'Or</div><div style=\"font-size:13px;color:#8fa3c0;line-height:1.7\">8 portraits · 24 questions · Niveau Expert<br>Portraits approfondis des grandes figures qui ont façonné la pensée mondiale sur les métaux précieux.</div></div><div class=\"info-box\"><strong>Pourquoi étudier ces figures ?</strong> Comprendre l'or, c'est comprendre ceux qui ont tenté de le maîtriser. Chaque portrait est une leçon de marché applicable dans votre conseil client.</div><div class=\"section-title\">Les 8 Maîtres</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">🏦</div><div class=\"step-body\"><div class=\"step-label\">Nathan Mayer Rothschild (1777–1836)</div><div class=\"step-detail\">Le banquier de Waterloo — premier fixeur de l'or à Londres</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">🪙</div><div class=\"step-body\"><div class=\"step-label\">J.P. Morgan (1837–1913)</div><div class=\"step-detail\">\"L'or est de l'argent. Tout le reste est du crédit.\"</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">📈</div><div class=\"step-body\"><div class=\"step-label\">Bernard Baruch (1870–1965)</div><div class=\"step-detail\">Le spéculateur philosophe — vendeur avant les krachs</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">🌍</div><div class=\"step-body\"><div class=\"step-label\">John Maynard Keynes (1883–1946)</div><div class=\"step-detail\">La relique barbare — et pourtant investisseur en or</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">🦅</div><div class=\"step-body\"><div class=\"step-label\">Alan Greenspan (1926–)</div><div class=\"step-detail\">Du gold standard défenseur au banquier central</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">💛</div><div class=\"step-body\"><div class=\"step-label\">Jim Sinclair (1940–2020)</div><div class=\"step-detail\">Mr Gold — trader légendaire, liquidation au sommet exact de 1980</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">📊</div><div class=\"step-body\"><div class=\"step-label\">Peter Schiff (1963–)</div><div class=\"step-detail\">La voix dissidente — toujours haussier sur l'or</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:16px;background:transparent\">🧮</div><div class=\"step-body\"><div class=\"step-label\">Ray Dalio (1949–)</div><div class=\"step-detail\">Le portefeuille All-Weather et la place de l'or</div></div></div></div>"},{"t":"Rothschild et Morgan","html":"<div class=\"section-title\">Nathan Mayer Rothschild — Le Banquier de Waterloo</div><div class=\"card\"><div class=\"step-detail\" style=\"line-height:1.8;margin-bottom:10px\">Né à Francfort en 1777, Nathan arrive à Londres en 1798. En 1815, grâce à son réseau de messagers, il apprend la victoire de Wellington à Waterloo <strong>24 heures avant tout le monde</strong>. Il vend d'abord ses obligations — semant la panique — puis rachète tout à prix cassé.</div><div class=\"ok-box\"><strong>Leçon :</strong> L'information est plus précieuse que l'or. Rester calme quand les autres paniquent est la fondation du succès en métaux précieux.</div></div><div class=\"section-title\" style=\"margin-top:18px\">J.P. Morgan — L'or est de l'argent</div><div class=\"card\"><div style=\"background:#fffbf0;border-left:4px solid #C8A84B;padding:12px 16px;border-radius:0 8px 8px 0;font-size:14px;font-style:italic;color:#5a4010;margin-bottom:12px\">« L'or est de l'argent. Tout le reste est du crédit. »<br><span style=\"font-size:11px;font-style:normal;color:#aaa\">— J.P. Morgan, devant le Congrès américain, 1912</span></div><div class=\"ok-box\"><strong>Face à un client hésitant entre or physique et ETF :</strong> « L'ETF est du crédit. L'or physique est la seule chose qui ne peut pas faire défaut. »</div></div>"},{"t":"Baruch, Keynes, Greenspan et Sinclair","html":"<div class=\"section-title\">Bernard Baruch</div><div class=\"card\"><div style=\"background:#fffbf0;border-left:4px solid #C8A84B;padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;font-style:italic;color:#5a4010;margin-bottom:10px\">« Je n'ai jamais acheté au plus bas ni vendu au plus haut. Seulement ceux qui mentent y parviennent. »</div><div class=\"ok-box\">Vendre avant le sommet est sage. Vendre en panique est catastrophique.</div></div><div class=\"section-title\" style=\"margin-top:16px\">Keynes — La Relique Barbare (mal comprise)</div><div class=\"card\"><div style=\"background:#fff5f5;border-left:4px solid #e24b4a;padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;font-style:italic;color:#7a1a1a;margin-bottom:10px\">« L'étalon-or est une relique barbare. » — 1923</div><div class=\"step-detail\">Keynes critiquait le SYSTÈME monétaire rigide — pas l'or comme actif personnel. Il investissait lui-même en or pour son compte et pour King's College Cambridge.</div></div><div class=\"section-title\" style=\"margin-top:16px\">Greenspan et Sinclair</div><div class=\"card\"><div class=\"step-detail\" style=\"margin-bottom:10px\"><strong>Greenspan (2014) :</strong> « L'or est une monnaie. C'est la seule monnaie qui n'a pas de passif. » — Un retour à sa conviction de 1966.</div><div class=\"step-detail\"><strong>Sinclair :</strong> Il achète massivement l'or entre 1974-1979 et liquide à <strong>887,50 $/oz le 21 janvier 1980</strong> — le jour exact du sommet historique.<br>« L'or n'est pas un investissement. C'est une assurance contre l'irresponsabilité des gouvernements. »</div></div>"},{"t":"Schiff et Dalio","html":"<div class=\"section-title\">Peter Schiff — La Voix Dissidente</div><div class=\"card\"><div style=\"background:#fffbf0;border-left:4px solid #C8A84B;padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;font-style:italic;color:#5a4010;margin-bottom:10px\">« L'or ne monte pas. C'est le dollar qui baisse. »</div><div class=\"ok-box\">Face à un client qui dit que l'or est trop cher : « En euros constants de 1971, l'or est le même. C'est votre pouvoir d'achat qui a changé. »</div></div><div class=\"section-title\" style=\"margin-top:18px\">Ray Dalio — Le Portefeuille All-Weather</div><div class=\"card\"><div style=\"background:#fffbf0;border-left:4px solid #C8A84B;padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;font-style:italic;color:#5a4010;margin-bottom:12px\">« Si vous n'avez pas 10% de votre patrimoine en or, vous ne connaissez ni l'histoire ni l'économie. » — Ray Dalio, 2019</div><table class=\"tbl\"><thead><tr><th>Configuration économique</th><th>Or</th><th>Actions</th><th>Obligations</th></tr></thead><tbody><tr><td>Croissance + Inflation basse</td><td>Neutre</td><td class=\"c-green\">Hausse</td><td class=\"c-green\">Hausse</td></tr><tr><td>Croissance + Inflation haute</td><td class=\"c-green\">Hausse</td><td>Neutre</td><td class=\"c-red\">Baisse</td></tr><tr><td>Récession + Inflation basse</td><td>Neutre</td><td class=\"c-red\">Baisse</td><td class=\"c-green\">Hausse</td></tr><tr><td>Stagflation</td><td class=\"c-green\"><strong>Forte hausse</strong></td><td class=\"c-red\">Forte baisse</td><td class=\"c-red\">Baisse</td></tr></tbody></table></div>"},{"t":"Synthèse — Leçons pour le conseil client","html":"<div class=\"section-title\">Arguments clés par situation</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Client hésite entre or physique et ETF</div><div class=\"step-detail\">Morgan : « L'ETF est du crédit. L'or physique ne peut pas faire défaut. »</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Client dit que l'or est trop cher</div><div class=\"step-detail\">Schiff : « En euros constants, l'or est le même. C'est votre pouvoir d'achat qui a changé. »</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Client veut vendre car le cours monte</div><div class=\"step-detail\">Baruch : « Vendre avant le sommet est sage. Vendre en panique est catastrophique. »</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Client sceptique sur l'or</div><div class=\"step-detail\">Greenspan : même les présidents de la Fed finissent par reconnaître que l'or est la seule monnaie sans passif.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Client demande pourquoi diversifier en or</div><div class=\"step-detail\">Dalio : en stagflation (notre contexte depuis 2021), l'or est l'actif qui performe le mieux.</div></div></div></div>"}],"quiz":[{"q":"Rothschild apprend Waterloo 24h avant les marchés. Que fait-il EN PREMIER ?","o":["Il achète massivement des obligations","Il vend pour créer la panique puis rachète à prix cassé","Il annonce la nouvelle","Il reste neutre"],"a":1},{"q":"« L'or est de l'argent. Tout le reste est du crédit. » — Qui a dit cela ?","o":["Alan Greenspan","Nathan Rothschild","J.P. Morgan","Jim Sinclair"],"a":2},{"q":"Keynes a dit « l'étalon-or est une relique barbare ». Qu'est-ce que cela signifie ?","o":["L'or n'a aucune valeur","Il critiquait le système monétaire rigide — pas l'or comme actif personnel","Il recommandait de ne jamais acheter d'or","Il prédisait la fin de l'or"],"a":1},{"q":"La philosophie de Baruch sur la vente est :","o":["Vendre au sommet exact","Vendre avant le sommet — seuls ceux qui mentent achètent au plus bas","Vendre en panique","Ne jamais vendre"],"a":1},{"q":"Jim Sinclair a liquidé sa position le 21 janvier 1980. C'était :","o":["Une erreur","Le jour exact du sommet historique","Trop tôt","Un hasard"],"a":1},{"q":"En 2014, Greenspan déclare que l'or est « la seule monnaie sans passif ». C'est :","o":["Une contradiction totale","Un retour à sa conviction de 1966","Une erreur de communication","Politique"],"a":1},{"q":"Face à un client qui dit que l'or est trop cher (argument Schiff) :","o":["Lui conseiller d'attendre","Dire que le cours va monter","En euros constants, c'est le pouvoir d'achat qui a changé","Lui vendre quand même"],"a":2},{"q":"Dans quelle configuration l'or performe le mieux selon Dalio ?","o":["Croissance forte + inflation basse","Récession + inflation basse","Stagflation (récession + inflation haute)","Croissance + inflation haute uniquement"],"a":2},{"q":"Dalio alloue quel % à l'or dans son All-Weather ?","o":["2,5%","5%","7,5%","15%"],"a":2},{"q":"Qui a prédit publiquement la crise des subprimes de 2008, moqué à l'époque ?","o":["Ray Dalio","Jim Sinclair","Peter Schiff","Bernard Baruch"],"a":2},{"q":"Point commun de toutes ces figures ?","o":["Toujours favorables à l'or","Tous ont reconnu que l'or physique est une réserve de valeur irremplaçable","Tous ont perdu sur l'or","Tous ont conseillé de ne jamais vendre"],"a":1},{"q":"Meilleur argument face à un client hésitant entre or physique et ETF ?","o":["L'ETF est moins cher","L'or physique est plus facile à revendre","L'ETF est du crédit — l'or physique ne peut pas faire défaut","Les ETF sont plus sûrs"],"a":2}]},{"id":"m6","code":"GB","title":"Gestion Boutique","dur":"3h","level":"Tous niveaux","sections":[{"t":"Ouverture et fermeture","html":"<div class=\"section-title\">Procédure d'ouverture</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Désactivation alarme</div><div class=\"step-detail\">Dans l'ordre exact du protocole sécurité. Anomalie → ne pas entrer, appeler sécurité.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Inspection visuelle</div><div class=\"step-detail\">Tour complet : vitrines, coffre, pas de trace d'intrusion. Anomalie → police + RC.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Ouverture du coffre</div><div class=\"step-detail\">Inventaire visuel rapide. Comparer avec le registre de la veille.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Mise en vitrine</div><div class=\"step-detail\">Selon le plan de vitrine. Noter tout écart dans le registre d'ouverture.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Allumage systèmes</div><div class=\"step-detail\">Caméras, alarme mode journée, 4D ouvert, balance calibrée.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Caisse d'ouverture</div><div class=\"step-detail\">Compter et enregistrer le fond de caisse dans 4D.</div></div></div><div class=\"step-row\"><div class=\"step-num\">7</div><div class=\"step-body\"><div class=\"step-label\">Registre d'ouverture signé</div><div class=\"step-detail\">Signer avec l'heure exacte. Document opposable.</div></div></div></div><div class=\"section-title\" style=\"margin-top:18px\">Procédure de fermeture</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Arrêt des ventes</div><div class=\"step-detail\">Clôturer la dernière transaction 15 min avant fermeture.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Clôture caisse</div><div class=\"step-detail\">Compter toutes coupures/pièces. Comparer avec total 4D. Écart > 1 € → documenter.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Rapport journalier 4D</div><div class=\"step-detail\">Imprimer/enregistrer le rapport de clôture journalière.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Remise en coffre</div><div class=\"step-detail\">Ranger tous les articles selon le plan de rangement.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Rapport KYC journalier</div><div class=\"step-detail\">Créer et transmettre au RC.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Activation alarme</div><div class=\"step-detail\">Dans l'ordre exact. Fermer à clé. Signer le registre de fermeture.</div></div></div></div><div class=\"alert-box\">🔴 SÉCURITÉ : En cas d'agression — NE PAS résister. Priorité : intégrité physique du personnel.</div>"},{"t":"Gestion de caisse journalière","html":"<div class=\"info-box\"><strong>La gestion de caisse est une obligation comptable et réglementaire.</strong> Rigueur absolue requise.</div><div class=\"section-title\">Saisie des devises sur 4D</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Comptage physique par devise</div><div class=\"step-detail\">Compter séparément chaque devise. Grouper par coupures.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Saisie 4D — Devises</div><div class=\"step-detail\">Module Caisse → Devises. Saisir le nombre de billets par coupure. 4D calcule le total en euros.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Saisie euros au détail</div><div class=\"step-detail\">Module Caisse → Euros. Saisir coupure par coupure : 500€/200€/100€/50€/20€/10€/5€ et pièces.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Validation et impression</div><div class=\"step-detail\">Valider, imprimer le ticket de caisse. Comparer avec comptage physique.</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Archivage</div><div class=\"step-detail\">Joindre le ticket au dossier journalier. Conserver 10 ans.</div></div></div></div><div class=\"section-title\" style=\"margin-top:16px\">Traitement des écarts</div><table class=\"tbl\"><thead><tr><th>Écart</th><th>Action</th></tr></thead><tbody><tr><td class=\"c-green\">< 1 €</td><td>Note dans le registre, pas de fiche d'anomalie</td></tr><tr><td class=\"c-amber\">1–10 €</td><td>Fiche d'anomalie + recherche de cause</td></tr><tr><td class=\"c-orange\">10–50 €</td><td>Fiche + validation RC + recomptage intégral</td></tr><tr><td class=\"c-red\">> 50 €</td><td>Alerte RC immédiate + rapport circonstancié</td></tr></tbody></table>"},{"t":"Contrôle de stocks hebdomadaire","html":"<div class=\"alert-box\">🔴 Chaque contrôle doit être signé par le Responsable Boutique ET validé par le Responsable Conformité.</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Imprimer l'inventaire 4D</div><div class=\"step-detail\">4D → Rapports → Inventaire. Imprimer toutes les références en stock à la date du contrôle.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Comptage physique méthodique</div><div class=\"step-detail\">Compter chaque référence : lingots (par poids), pièces (par type), bijoux (par référence), devises.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Cochage et scanner</div><div class=\"step-detail\">Cocher chaque ligne de l'inventaire 4D. Scanner le QR code si disponible.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Rapport d'inventaire daté</div><div class=\"step-detail\">Compiler les résultats. Dater et signer (Responsable Boutique).</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Validation RC</div><div class=\"step-detail\">Transmettre au RC pour validation et signature dans les 48h.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Archivage</div><div class=\"step-detail\">Archiver le rapport signé. Conservation : 5 ans.</div></div></div></div>"},{"t":"Conformité et saisie comptable","html":"<div class=\"section-title\">Rapport KYC journalier</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Extraire les opérations du jour</div><div class=\"step-detail\">Lister toutes les opérations depuis 4D ou le registre manuel.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Vérifier la complétude des KYC</div><div class=\"step-detail\">Pour chaque opération : fiche KYC complète ? Pièce ID présente ?</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Identifier les opérations atypiques</div><div class=\"step-detail\">Montant inhabituel, client nouveau avec gros volume, comportement signalé.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Créer et transmettre au RC</div><div class=\"step-detail\">Document synthétique : date, nombre opérations, montant total, atypiques identifiées.</div></div></div></div><div class=\"section-title\" style=\"margin-top:16px\">Saisie comptable journalière</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Extraire les opérations 4D du jour</div><div class=\"step-detail\">Rapport de clôture journalière 4D → liste de toutes les factures avec numéros.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Saisir dans l'ordre chronologique</div><div class=\"step-detail\">Une ligne par opération. N° facture 4D + N° AOEA Pro si applicable.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Vérifier le solde bancaire</div><div class=\"step-detail\">Récupérer le solde du compte boutique et le saisir dans le fichier Excel.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Sauvegarder et partager</div><div class=\"step-detail\">Envoyer la version du jour au RC et à la Direction.</div></div></div></div><div class=\"ok-box\"><strong>Règle d'or :</strong> Si une opération n'a pas de numéro de facture 4D correspondant — elle n'est pas comptabilisée.</div>"}],"quiz":[{"q":"Lors de l'ouverture, vous constatez une anomalie sur la serrure. Que faites-vous ?","o":["Entrer et vérifier","Ne pas entrer — appeler police et sécurité","Appeler un serrurier","Ouvrir avec la clé de secours"],"a":1},{"q":"Un écart de caisse de 35 € en clôture. Bonne procédure ?","o":["Note sans suite","Fiche d'anomalie + validation RC + recomptage intégral","Corriger dans 4D","Attendre le lendemain"],"a":1},{"q":"Le contrôle de stocks hebdomadaire doit être validé par :","o":["Le RB seul","Le RB ET le RC","La Direction uniquement","N'importe quel agent formé"],"a":1},{"q":"Un scellé de lingotin ouvert lors du comptage. Vous :","o":["Le laissez et continuez","Notez comme anomalie sans modifier 4D, alertez le RC immédiatement","Refermez le scellé","Enregistrez dans 4D directement"],"a":1},{"q":"Le rapport KYC journalier doit être créé :","o":["Une fois par semaine","Chaque fin de journée et transmis au RC","Quand il y a des atypiques","Une fois par mois"],"a":1},{"q":"Une opération atypique non validée par le RC dans les 24h doit être :","o":["Annulée automatiquement","Signalée à la Direction","Reclassée en standard","Reportée à la semaine suivante"],"a":1},{"q":"Dans le fichier Excel comptable, le N° AOEA Pro est :","o":["Facultatif pour les petits montants","Obligatoire sur toutes les opérations de fonte et vente professionnelle","Seulement > 10 000 €","Seulement pour nouveaux clients"],"a":1},{"q":"Si le total Excel ne correspond pas au relevé bancaire en fin de mois :","o":["Corriger dans Excel directement","Escalade Direction + comptable — jamais corriger sans traçabilité","Attendre le mois suivant","Informer seulement le RC"],"a":1},{"q":"La mise à jour hebdomadaire des dossiers clients concerne :","o":["Uniquement les nouveaux clients","Clients ayant opéré dans la semaine + ceux dont le KYC arrive à échéance","Uniquement KYC incomplets","Tous les clients sans distinction"],"a":1},{"q":"En cas d'agression en boutique, la priorité absolue est :","o":["Protéger le stock or","L'intégrité physique du personnel — ne pas résister","Activer l'alarme et attendre","Fermer la caisse et le coffre"],"a":1}]},{"id":"m7","code":"CAS","title":"Cas Réels et Calculs","dur":"2h","level":"Confirmé","sections":[{"t":"Rachat d'un lingot 1 kg — calcul complet","html":"<div class=\"section-title\">Qu'est-ce que le poids de fin ?</div><div class=\"card\"><div class=\"step-detail\" style=\"line-height:1.8;margin-bottom:10px\">Un lingot n'est jamais à 999,9‰ de pureté totale. Le <strong>poids brut</strong> est ce que la balance affiche. Le <strong>poids de fin</strong> est la quantité réelle d'or pur contenu dans le lingot, calculée à partir du titre certifié.</div><div style=\"background:#fffbf0;border-left:4px solid #C8A84B;padding:12px 16px;border-radius:0 8px 8px 0;font-size:15px;font-weight:700;color:#5a4010;margin-bottom:10px\">Formule : Poids de fin = Poids brut (g) × Titre (‰ / 1000)</div><div class=\"step-detail\">Exemple : Lingot 1 000,3g · Titre 999,5‰ → 1 000,3 × 0,9995 = <strong>999,8g d'or pur</strong></div></div><div class=\"section-title\" style=\"margin-top:18px\">Procédure de rachat lingot 1 kg</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\">1</div><div class=\"step-body\"><div class=\"step-label\">Réception et inspection</div><div class=\"step-detail\">N° de série correspond au certificat. Poinçon lisible. Sceau intact.</div></div></div><div class=\"step-row\"><div class=\"step-num\">2</div><div class=\"step-body\"><div class=\"step-label\">Pesée officielle</div><div class=\"step-detail\">Balance certifiée. Annoncer le poids au client.</div></div></div><div class=\"step-row\"><div class=\"step-num\">3</div><div class=\"step-body\"><div class=\"step-label\">Vérification du titre</div><div class=\"step-detail\">Lire sur le certificat d'assay. Si pas de certificat : XRF obligatoire.</div></div></div><div class=\"step-row\"><div class=\"step-num\">4</div><div class=\"step-body\"><div class=\"step-label\">Calcul du poids de fin</div><div class=\"step-detail\">Ex : 1 000,35 × (999,9/1000) = 1 000,35 × 0,9999 = 1 000,25g d'or pur</div></div></div><div class=\"step-row\"><div class=\"step-num\">5</div><div class=\"step-body\"><div class=\"step-label\">Saisie dans 4D</div><div class=\"step-detail\">Saisir le poids BRUT dans 4D. Le logiciel recalcule automatiquement le poids de fin selon le titre saisi.</div></div></div><div class=\"step-row\"><div class=\"step-num\">6</div><div class=\"step-body\"><div class=\"step-label\">Calcul du prix</div><div class=\"step-detail\">Prix = Poids fin × Cours spot × (1 − Marge). Ex : 1 000,25 × 85 × 0,97 = 82 420 €</div></div></div><div class=\"step-row\"><div class=\"step-num\">7</div><div class=\"step-body\"><div class=\"step-label\">Documents obligatoires</div><div class=\"step-detail\">Pièce ID + copie · Bon de rachat · Formulaire rétractation · Livre de police · KYC</div></div></div><div class=\"step-row\"><div class=\"step-num\">8</div><div class=\"step-body\"><div class=\"step-label\">Paiement</div><div class=\"step-detail\">Virement bancaire OBLIGATOIRE — Art. L.112-6 CMF. Espèces INTERDITES sur les métaux précieux.</div></div></div></div><div class=\"section-title\" style=\"margin-top:18px\">Calculateur — Poids de fin et prix de rachat</div><div class=\"card\" style=\"background:#fffbf0;border:1.5px solid #C8A84B\"><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px\"><div><div style=\"font-size:11px;font-weight:700;color:#5a4010;text-transform:uppercase;margin-bottom:5px\">Poids brut (g)</div><input type=\"number\" id=\"calc-brut\" value=\"1000.35\" step=\"0.01\" oninput=\"calcLingot()\" style=\"width:100%;padding:9px 12px;border:1.5px solid #e8c96a;border-radius:7px;font-size:15px;font-weight:700;background:#fff;outline:none\"></div><div><div style=\"font-size:11px;font-weight:700;color:#5a4010;text-transform:uppercase;margin-bottom:5px\">Titre (‰)</div><input type=\"number\" id=\"calc-titre\" value=\"999.9\" step=\"0.1\" oninput=\"calcLingot()\" style=\"width:100%;padding:9px 12px;border:1.5px solid #e8c96a;border-radius:7px;font-size:15px;font-weight:700;background:#fff;outline:none\"></div><div><div style=\"font-size:11px;font-weight:700;color:#5a4010;text-transform:uppercase;margin-bottom:5px\">Cours spot (€/g)</div><input type=\"number\" id=\"calc-cours\" value=\"85.00\" step=\"0.01\" oninput=\"calcLingot()\" style=\"width:100%;padding:9px 12px;border:1.5px solid #e8c96a;border-radius:7px;font-size:15px;font-weight:700;background:#fff;outline:none\"></div><div><div style=\"font-size:11px;font-weight:700;color:#5a4010;text-transform:uppercase;margin-bottom:5px\">Marge boutique (%)</div><input type=\"number\" id=\"calc-marge\" value=\"3\" step=\"0.5\" oninput=\"calcLingot()\" style=\"width:100%;padding:9px 12px;border:1.5px solid #e8c96a;border-radius:7px;font-size:15px;font-weight:700;background:#fff;outline:none\"></div></div><div style=\"background:#1B2A4A;border-radius:8px;padding:14px 16px;color:#fff\"><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\"><div><div style=\"font-size:11px;color:#8fa3c0;margin-bottom:3px\">Poids de fin</div><div id=\"res-poids\" style=\"font-size:20px;font-weight:700;color:#C8A84B\">—</div></div><div><div style=\"font-size:11px;color:#8fa3c0;margin-bottom:3px\">Valeur théorique</div><div id=\"res-valeur\" style=\"font-size:20px;font-weight:700;color:#C8A84B\">—</div></div><div><div style=\"font-size:11px;color:#8fa3c0;margin-bottom:3px\">Prix de rachat proposé</div><div id=\"res-prix\" style=\"font-size:22px;font-weight:700;color:#fff\">—</div></div><div><div style=\"font-size:11px;color:#8fa3c0;margin-bottom:3px\">Marge boutique (€)</div><div id=\"res-marge\" style=\"font-size:20px;font-weight:700;color:#8fa3c0\">—</div></div></div></div></div>"},{"t":"TMP et TPV — Calcul des taxes","html":"<div class=\"alert-box\">🔴 Le client qui vend son or doit déclarer et payer l'impôt. Votre rôle : l'informer des deux régimes. Vous n'êtes pas son conseiller fiscal.</div><div class=\"section-title\">Les deux régimes fiscaux</div><table class=\"tbl\"><thead><tr><th>Régime</th><th>Taux</th><th>Base</th><th>Formulaire</th></tr></thead><tbody><tr><td class=\"c-red\"><strong>TMP</strong> — Taxe forfaitaire</td><td class=\"c-red\" style=\"font-weight:700\">11,5%</td><td>Prix de vente TTC</td><td>Cerfa 2091-SD</td></tr><tr><td class=\"c-green\"><strong>TPV</strong> — Plus-values réelles</td><td class=\"c-green\" style=\"font-weight:700\">36,2% sur PV nette</td><td>Prix vente − Prix achat (avec abattements)</td><td>Cerfa 2048-M-SD</td></tr></tbody></table><div class=\"info-box\" style=\"margin-top:12px\"><strong>Abattements TPV :</strong> 0% pendant 2 ans, puis 5%/an dès la 3e année → Exonération totale après 22 ans.</div><div class=\"section-title\" style=\"margin-top:16px\">Calculateur TMP vs TPV</div><div class=\"card\" style=\"background:#f8f9fb\"><div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px\"><div><div style=\"font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:5px\">Prix de vente (€)</div><input type=\"number\" id=\"t-vente\" value=\"85000\" oninput=\"calcTax()\" style=\"width:100%;padding:9px 12px;border:1.5px solid #dde1e7;border-radius:7px;font-size:14px;font-weight:700;background:#fff;outline:none\"></div><div><div style=\"font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:5px\">Prix d'achat (€)</div><input type=\"number\" id=\"t-achat\" value=\"62000\" oninput=\"calcTax()\" style=\"width:100%;padding:9px 12px;border:1.5px solid #dde1e7;border-radius:7px;font-size:14px;font-weight:700;background:#fff;outline:none\"></div><div><div style=\"font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:5px\">Années de détention</div><input type=\"number\" id=\"t-annees\" value=\"5\" min=\"0\" max=\"30\" oninput=\"calcTax()\" style=\"width:100%;padding:9px 12px;border:1.5px solid #dde1e7;border-radius:7px;font-size:14px;font-weight:700;background:#fff;outline:none\"></div></div><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\"><div style=\"background:#fff5f5;border:1.5px solid #e24b4a;border-radius:10px;padding:14px\"><div style=\"font-size:12px;font-weight:700;color:#a32d2d;margin-bottom:10px\">Régime TMP</div><div style=\"font-size:11px;color:#777;margin-bottom:3px\">Base : prix de vente × 11,5%</div><div id=\"tmp-base\" style=\"font-size:13px;color:#555;margin-bottom:6px\">—</div><div style=\"font-size:11px;color:#777;margin-bottom:3px\">Taxe à payer</div><div id=\"tmp-taxe\" style=\"font-size:22px;font-weight:700;color:#a32d2d\">—</div><div id=\"tmp-net\" style=\"font-size:12px;color:#777;margin-top:6px\">Net perçu : —</div></div><div style=\"background:#f0fae8;border:1.5px solid #639922;border-radius:10px;padding:14px\"><div style=\"font-size:12px;font-weight:700;color:#27500A;margin-bottom:10px\">Régime TPV</div><div style=\"font-size:11px;color:#555;margin-bottom:3px\">Abattement (<span id=\"tpv-pct\">—</span>%)</div><div id=\"tpv-pv\" style=\"font-size:13px;color:#27500A;margin-bottom:4px\">—</div><div id=\"tpv-abat\" style=\"font-size:13px;color:#27500A;margin-bottom:4px\">—</div><div style=\"font-size:11px;color:#555;margin-bottom:3px\">Taxe à payer</div><div id=\"tpv-taxe\" style=\"font-size:22px;font-weight:700;color:#27500A\">—</div><div id=\"tpv-net\" style=\"font-size:12px;color:#555;margin-top:6px\">Net perçu : —</div></div></div><div id=\"tax-conseil\" style=\"margin-top:12px;padding:10px 14px;border-radius:8px;font-size:12px;font-weight:700\"></div></div>"},{"t":"Cas pratiques","html":"<div class=\"section-title\">Cas 1 — Client sans justificatif d'achat</div><div class=\"card\"><div class=\"step-label\">Situation</div><div class=\"step-detail\" style=\"margin-bottom:10px\">Mme Martin vend 5 Napoléons reçus en héritage. Aucun justificatif. Prix de vente : 2 850 €.</div><div class=\"step-label\" style=\"margin-top:10px\">Solution</div><div class=\"step-detail\">Sans justificatif → seul le régime TMP est applicable.<br>TMP = 2 850 × 11,5% = <strong>327,75 €</strong> → Cerfa 2091-SD<br>Net perçu : 2 850 − 327,75 = 2 522,25 €</div></div><div class=\"section-title\" style=\"margin-top:18px\">Cas 2 — Lingot 100g acheté en 2018</div><div class=\"card\"><div class=\"step-label\">Situation</div><div class=\"step-detail\" style=\"margin-bottom:10px\">M. Dupont vend en 2026 un lingot 100g acheté en 2018 à 4 200 €. Prix de vente : 8 800 €. Facture disponible.</div><div class=\"step-label\" style=\"margin-top:10px\">Calcul TPV (8 ans)</div><div class=\"step-detail\">PV brute : 8 800 − 4 200 = 4 600 €<br>Abattement : (8−2) × 5% = 30% → −1 380 €<br>PV nette : 3 220 € → Taxe : 3 220 × 36,2% = <strong>1 165,64 €</strong></div><div class=\"step-label\" style=\"margin-top:10px\">TMP (comparaison)</div><div class=\"step-detail\">8 800 × 11,5% = <strong>1 012 €</strong> → TMP plus avantageux ici !</div><div class=\"ok-box\" style=\"margin-top:10px\">Informer le client des deux options — la décision lui appartient.</div></div><div class=\"section-title\" style=\"margin-top:18px\">Cas 3 — Lingot 1 kg détenu 25 ans</div><div class=\"card\"><div class=\"step-detail\">Client vend un lingot 1 kg acheté en 2001 à 9 500 €. Prix de vente : 85 000 €.<br>25 ans ≥ 22 ans → Abattement 100% → <strong>Exonération totale TPV</strong><br>TMP : 85 000 × 11,5% = 9 775 €</div><div class=\"alert-box\" style=\"margin-top:10px\">TPV obligatoirement plus avantageux après 22 ans. Exonération totale si facture d'achat disponible.</div></div>"}],"quiz":[{"q":"La formule du poids de fin est :","o":["Poids brut ÷ Titre","Poids brut × (Titre / 1000)","Titre × Cours spot","Poids brut − Marge"],"a":1},{"q":"Dans 4D, pour le rachat d'un lingot, on saisit :","o":["Le poids de fin directement","Le poids brut — 4D calcule automatiquement le poids de fin","Le poids moyen","Le poids certifié LBMA"],"a":1},{"q":"Le régime TMP est calculé sur :","o":["La plus-value réalisée","Le prix de vente brut × 11,5%","Le prix d'achat","La différence vente/achat"],"a":1},{"q":"Le taux de la TMP sur les métaux précieux est :","o":["11,5%","19,6%","36,2%","7,5%"],"a":0},{"q":"L'abattement TPV commence à partir de :","o":["La 1re année","La 2e année","La 3e année (5% par an ensuite)","La 5e année"],"a":2},{"q":"Après combien d'années l'exonération totale en régime TPV est-elle acquise ?","o":["15 ans","20 ans","22 ans","30 ans"],"a":2},{"q":"Un client vend 8 800 € un bien acheté 4 200 € il y a 8 ans. La meilleure approche est :","o":["TPV toujours plus avantageuse avec justificatif","TMP toujours plus avantageuse","Calculer les deux et choisir le plus avantageux","Pas de taxe sur les métaux"],"a":2},{"q":"Le Cerfa utilisé pour déclarer la TMP est :","o":["Cerfa 2048-M-SD","Cerfa 2091-SD","Cerfa 2042","Cerfa 3115-SD"],"a":1}]},{"id":"m8","code":"FISC","title":"Fiscalité MP et Cerfa","dur":"2h","level":"Confirmé","sections":[{"t":"Cadre légal de la fiscalité MP","html":"<div class=\"section-title\">Textes applicables</div><table class=\"tbl\"><thead><tr><th>Texte</th><th>Objet</th></tr></thead><tbody><tr><td><strong>Art. 150 VI CGI</strong></td><td>Définit la taxe forfaitaire sur les métaux précieux (TMP)</td></tr><tr><td><strong>Art. 150 VII CGI</strong></td><td>Option pour le régime des plus-values réelles (TPV)</td></tr><tr><td><strong>Art. 150 UA CGI</strong></td><td>Champ d'application — définit les métaux concernés</td></tr><tr><td><strong>Directive 98/80/CE</strong></td><td>Exonération de TVA sur l'or d'investissement</td></tr><tr><td><strong>Art. 298 sexdecies A CGI</strong></td><td>Transposition française — exonération TVA or d'investissement</td></tr><tr><td><strong>Art. L.112-6 et L.112-7 CMF</strong></td><td>Interdiction paiements espèces — Décret 6 mai 2010</td></tr></tbody></table><div class=\"section-title\" style=\"margin-top:16px\">Quels biens sont concernés ?</div><table class=\"tbl\"><thead><tr><th>Bien</th><th>Fiscalité vente</th><th>TVA achat</th></tr></thead><tbody><tr><td class=\"c-amber\"><strong>Or d'investissement</strong><br>(lingots ≥ 995‰, pièces ≥ 900‰ post-1800)</td><td>TMP 11,5% ou TPV 36,2%</td><td class=\"c-green\">Exonéré — Art. 298 sexdecies A CGI</td></tr><tr><td class=\"c-amber\"><strong>Argent d'investissement</strong></td><td>TMP 11,5% ou TPV 36,2%</td><td>TVA 20%</td></tr><tr><td><strong>Bijoux or / objets précieux</strong></td><td>TMP 6,5% ou TPV</td><td>TVA 20% (neuf) · Marge (occasion)</td></tr><tr><td><strong>Platine, palladium brut</strong></td><td>TMP 11,5% ou TPV 36,2%</td><td>TVA 20%</td></tr></tbody></table>"},{"t":"La TMP — Cerfa 2091-SD","html":"<div class=\"section-title\">Fonctionnement de la TMP</div><div class=\"card\"><div class=\"step-detail\" style=\"line-height:1.8;margin-bottom:12px\">La <strong>Taxe forfaitaire sur les Métaux Précieux (TMP)</strong> est prélevée sur le prix de vente brut, sans tenir compte du prix d'achat. Simple à calculer, sans justificatif requis.</div><table class=\"tbl\"><thead><tr><th>Type de bien</th><th>Taux TMP</th><th>Dont CRDS</th></tr></thead><tbody><tr><td>Or, argent, platine, palladium</td><td class=\"c-red\" style=\"font-weight:700\">11,5%</td><td>0,5%</td></tr><tr><td>Bijoux, objets d'art, collection</td><td class=\"c-amber\" style=\"font-weight:700\">6,5%</td><td>0,5%</td></tr></tbody></table></div><div class=\"section-title\" style=\"margin-top:16px\">Comment remplir le Cerfa 2091-SD</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922;font-size:10px\">✓</div><div class=\"step-body\"><div class=\"step-label\">Cadre 1 — Identité du cédant</div><div class=\"step-detail\">Nom, prénom, adresse complète, date de naissance du vendeur. Copier depuis la pièce d'identité.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922;font-size:10px\">✓</div><div class=\"step-body\"><div class=\"step-label\">Cadre 2 — Identité de l'acquéreur</div><div class=\"step-detail\">SAS FORTUNAQUI · GODOT ET FILS. Adresse complète. SIRET.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922;font-size:10px\">✓</div><div class=\"step-body\"><div class=\"step-label\">Cadre 3 — Désignation du bien</div><div class=\"step-detail\">Description précise : « Or en lingot de 1 000g, titre 999,9‰, N° série XXXX »</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922;font-size:10px\">✓</div><div class=\"step-body\"><div class=\"step-label\">Cadre 4 — Prix de cession</div><div class=\"step-detail\">Montant brut payé au vendeur. Base de calcul de la TMP.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#639922;font-size:10px\">✓</div><div class=\"step-body\"><div class=\"step-label\">Cadre 5 — Taxe due</div><div class=\"step-detail\">Prix × 11,5% (taxe) + Prix × 0,5% (CRDS) = Total à verser aux impôts.</div></div></div></div><div class=\"section-title\" style=\"margin-top:16px\">Exemple chiffré — lingot 85 000 €</div><table class=\"tbl\"><thead><tr><th>Ligne</th><th>Calcul</th><th>Montant</th></tr></thead><tbody><tr><td>Prix de cession</td><td>Montant brut</td><td class=\"c-amber\" style=\"font-weight:700\">85 000 €</td></tr><tr><td>Taxe (11,5%)</td><td>85 000 × 11,5%</td><td class=\"c-red\" style=\"font-weight:700\">9 775 €</td></tr><tr><td>CRDS (0,5%)</td><td>85 000 × 0,5%</td><td style=\"font-weight:700\">425 €</td></tr><tr><td><strong>Total aux impôts</strong></td><td>9 775 + 425</td><td class=\"c-red\" style=\"font-weight:700;font-size:15px\">10 200 €</td></tr><tr><td>Net client</td><td>85 000 − 10 200</td><td class=\"c-green\" style=\"font-weight:700\">74 800 €</td></tr></tbody></table>"},{"t":"La TPV — Cerfa 2048-M-SD","html":"<div class=\"section-title\">Fonctionnement de la TPV</div><div class=\"card\"><div style=\"background:#fffbf0;border-left:4px solid #C8A84B;padding:12px 16px;border-radius:0 8px 8px 0;font-size:13px;line-height:1.8\"><strong>Taux global TPV : 36,2%</strong> (19% impôt + 17,2% prélèvements sociaux)<br><strong>Abattement :</strong> 5% par année de détention à partir de la 3e année<br><strong>Exonération totale :</strong> après 22 ans de détention<br><strong>Conditions :</strong> justificatif d'achat obligatoire</div></div><div class=\"section-title\" style=\"margin-top:16px\">Comment remplir le Cerfa 2048-M-SD</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\" style=\"background:#1B2A4A;color:#C8A84B\">→</div><div class=\"step-body\"><div class=\"step-label\">Rubrique 510 — Identification</div><div class=\"step-detail\">Identité complète du contribuable. Date et lieu de cession.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#1B2A4A;color:#C8A84B\">→</div><div class=\"step-body\"><div class=\"step-label\">Rubrique 530 — Prix de cession</div><div class=\"step-detail\">Prix de vente brut (ce que vous avez payé au client).</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#1B2A4A;color:#C8A84B\">→</div><div class=\"step-body\"><div class=\"step-label\">Rubrique 540 — Prix d'acquisition</div><div class=\"step-detail\">Prix d'achat justifié par la facture d'origine.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#1B2A4A;color:#C8A84B\">→</div><div class=\"step-body\"><div class=\"step-label\">Rubrique 550 — Plus-value brute</div><div class=\"step-detail\">Prix cession − Prix acquisition = PV brute.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#1B2A4A;color:#C8A84B\">→</div><div class=\"step-body\"><div class=\"step-label\">Rubrique 560 — Abattement</div><div class=\"step-detail\">(Années − 2) × 5% × PV brute. Maximum 100% à 22 ans.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#1B2A4A;color:#C8A84B\">→</div><div class=\"step-body\"><div class=\"step-label\">Rubrique 580 — Impôt dû</div><div class=\"step-detail\">PV nette × 19% (impôt) + PV nette × 17,2% (PS) = Total × 36,2%</div></div></div></div><div class=\"section-title\" style=\"margin-top:16px\">Abattements TPV — référence rapide</div><table class=\"tbl\"><thead><tr><th>Années de détention</th><th>Abattement</th><th>Taxe sur 10 000 € PV</th></tr></thead><tbody><tr><td>0 à 2 ans</td><td>0%</td><td>3 620 €</td></tr><tr><td>3 ans</td><td>5%</td><td>3 439 €</td></tr><tr><td>5 ans</td><td>15%</td><td>3 077 €</td></tr><tr><td>10 ans</td><td>40%</td><td>2 172 €</td></tr><tr><td>15 ans</td><td>65%</td><td>1 267 €</td></tr><tr><td>20 ans</td><td>90%</td><td>362 €</td></tr><tr><td>22 ans et +</td><td style=\"color:#27500A;font-weight:700\">100%</td><td style=\"color:#27500A;font-weight:700\">0 € (exonéré)</td></tr></tbody></table>"},{"t":"Arbre de décision TMP vs TPV","html":"<div class=\"section-title\">Comment choisir entre TMP et TPV ?</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\" style=\"background:#C8A84B;color:#1B2A4A\">Q1</div><div class=\"step-body\"><div class=\"step-label\">Le client a-t-il le justificatif d'achat ?</div><div class=\"step-detail\">Non → TMP obligatoire. Oui → comparer les deux régimes.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#C8A84B;color:#1B2A4A\">Q2</div><div class=\"step-body\"><div class=\"step-label\">La détention est-elle ≥ 22 ans ?</div><div class=\"step-detail\">Oui → TPV toujours meilleure (exonération totale). Non → continuer.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#C8A84B;color:#1B2A4A\">Q3</div><div class=\"step-body\"><div class=\"step-label\">Calculer les deux taxes</div><div class=\"step-detail\">TMP = Prix vente × 11,5% · TPV = PV nette × 36,2%. Choisir le plus bas.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"background:#C8A84B;color:#1B2A4A\">Q4</div><div class=\"step-body\"><div class=\"step-label\">Informer le client</div><div class=\"step-detail\">Lui montrer les deux montants. La décision est la sienne — vous n'êtes pas conseiller fiscal.</div></div></div></div><div class=\"section-title\" style=\"margin-top:16px\">Documents à remettre au client après chaque vente</div><div class=\"card\"><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:10px;background:#1B2A4A\">📄</div><div class=\"step-body\"><div class=\"step-label\">Facture de rachat</div><div class=\"step-detail\">Obligatoire. Archiver 10 ans.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:10px;background:#1B2A4A\">📄</div><div class=\"step-body\"><div class=\"step-label\">Cerfa 2091-SD (si TMP)</div><div class=\"step-detail\">Pré-remplir les cadres 1-2-4. Le client complète, signe et dépose aux impôts dans le mois.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:10px;background:#1B2A4A\">📄</div><div class=\"step-body\"><div class=\"step-label\">Cerfa 2048-M-SD (si TPV)</div><div class=\"step-detail\">Le client joint ce formulaire à sa déclaration de revenus annuelle.</div></div></div><div class=\"step-row\"><div class=\"step-num\" style=\"font-size:10px;background:#1B2A4A\">📄</div><div class=\"step-body\"><div class=\"step-label\">Votre facture d'achat</div><div class=\"step-detail\">Rappeler au client de conserver sa facture pour les futures cessions.</div></div></div></div><div class=\"alert-box\">🔴 RESPONSABILITÉ : SAS FORTUNAQUI n'est pas conseiller fiscal. Votre rôle est d'informer. Pour montants importants, recommander un comptable ou notaire.</div>"}],"quiz":[{"q":"Quel article du CGI définit la TMP ?","o":["Art. 150 VI","Art. 298 sexdecies A","Art. 150 UA","Art. L.112-6 CMF"],"a":0},{"q":"La CRDS s'applique à quel taux ?","o":["1%","0,5%","2%","Seulement si TMP"],"a":1},{"q":"L'or d'investissement est exonéré de TVA en vertu de :","o":["Art. 150 VI CGI","Art. 298 sexdecies A CGI + Directive 98/80/CE","Art. L.112-6 CMF","Décret du 6 mai 2010"],"a":1},{"q":"Le Cerfa 2091-SD est déposé aux impôts :","o":["Avant la vente","Dans l'année suivant la vente","Dans le mois suivant la cession","Avec la déclaration annuelle"],"a":2},{"q":"Le Cerfa 2048-M-SD concerne :","o":["Le régime TMP","Le régime TPV — plus-values réelles","Les deux régimes","La TVA sur les métaux"],"a":1},{"q":"Un client vend des bijoux or. Le taux TMP applicable est :","o":["11,5%","6,5%","20%","36,2%"],"a":1},{"q":"La TPV est toujours plus avantageuse que la TMP :","o":["Vrai — elle prend en compte le prix d'achat","Faux — il faut calculer les deux et comparer","Vrai — mais seulement après 5 ans","Faux — la TMP est toujours plus simple"],"a":1},{"q":"Si un client n'a pas de justificatif d'achat :","o":["Refuser l'achat","Appliquer obligatoirement la TMP","Appliquer la TPV sans justificatif","Déduire 40% comme coût estimé"],"a":1}]},{"id":"m9","code":"GST","title":"Gestion de Stock & Optimisation des Marges","dur":"3h","level":"Confirmé · Vente","sections":[{"t":"Les produits d'or d'investissement","html":"<div class=\"hero\" style=\"background:linear-gradient(135deg,#1B2A4A,#243a64);border-radius:10px;padding:20px 24px;margin-bottom:18px;color:#fff\"><div style=\"font-size:10px;color:#C8A84B;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px\">Module Gestion de Stock · Vente</div><div style=\"font-size:20px;font-weight:700;margin-bottom:4px\">Produits, Marges et Optimisation du Stock</div><div style=\"font-size:12px;color:#8fa3c0\">Or de bourse · Or moderne · Pièces hors cote · Lingots · Argent · Prime · Stratégie de vente</div></div>\n\n<div class=\"section-title\">1. Or de bourse (pièces cotées) — Référence de marché</div>\n<table class=\"tbl\"><thead><tr><th>Produit</th><th>Poids or pur</th><th>Prime typique</th><th>Liquidité</th><th>Profil acheteur</th></tr></thead><tbody>\n<tr><td class=\"c-amber\"><strong>Napoléon 20 Fr</strong></td><td>5,806g (900‰)</td><td>10–25%</td><td>Excellente — FR et Europe</td><td>Tous profils, entrée de gamme</td></tr>\n<tr><td class=\"c-amber\"><strong>Napoléon 10 Fr</strong></td><td>2,903g (900‰)</td><td>20–40%</td><td>Bonne — FR</td><td>Petit budget, cadeau</td></tr>\n<tr><td class=\"c-amber\"><strong>Vreneli 20 CHF</strong></td><td>5,806g (900‰)</td><td>10–20%</td><td>Bonne — Suisse/ESP</td><td>Clientèle transfrontalière</td></tr>\n<tr><td class=\"c-amber\"><strong>Souverain anglais</strong></td><td>7,322g (916‰)</td><td>10–20%</td><
